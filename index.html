    ,{id:'disable-multiplane-overlay',icon:'🖥️',name:'Disable Multiplane Overlay (MPO)',style:'gc',badges:['gpu','system'],
     impact:`MPO causes frame drops, black screens, and stutters on many NVIDIA/AMD cards — especially during alt-tab or with multi-monitor setups. Disabling resolves these issues with zero visual quality loss.`,
     desc:'Disables MPO via OverlayTestMode=5 registry key. Recommended if you experience frame pacing issues, flickering on alt-tab, or random black screens. Requires restart.',
     apply:`@echo off
REM Disable Multiplane Overlay (MPO)
reg add "HKLM\\SOFTWARE\\Microsoft\\Windows\\Dwm" /v OverlayTestMode /t REG_DWORD /d 5 /f
echo Done. Restart required.
pause`,
     revert:`@echo off
reg delete "HKLM\\SOFTWARE\\Microsoft\\Windows\\Dwm" /v OverlayTestMode /f 2>nul
echo Done. Restart required.
pause`}
  ],
  memory: [
    {id:'page-combining',icon:'💾',name:'Disable Memory Page Combining',badges:['perf','mem'],
     impact:`Memory page combining merges identical RAM pages across processes to save memory. During a CS2 match this scanning process runs constantly in the background, consuming CPU cycles to compare page contents. The overhead is highest when multiple processes (Discord, browser, game) have similar memory patterns.`,
     desc:'CS2 uses significant RAM with texture data, sound samples, and game state. Page combining\'s constant background scanning adds CPU overhead that shows as unpredictable CPU load spikes during matches. Disabling it eliminates this background scanner, trading a small amount of RAM efficiency for consistent CPU availability during gaming.',
     apply:`powershell -Command "Disable-MMAgent -mc"`,
     revert:`powershell -Command "Enable-MMAgent -mc"`},
    {id:'large-pages',icon:'📄',name:'Enable Large System Cache Pages',badges:['perf','mem'],
     impact:`Large pages (2MB) instead of small pages (4KB) reduce the number of TLB entries needed to map game memory. The TLB is a small fast cache for memory mappings — TLB misses require slow page table walks. CS2 and Valorant both access large amounts of memory quickly, benefiting from fewer TLB misses.`,
     desc:'During intense CS2 moments (bombsite executes, smoke rounds) the game accesses many different memory regions rapidly. Large pages reduce TLB misses during these high-memory-access periods, keeping memory access latency low throughout the most demanding moments of a match. SAFETY NOTE: This tweak is performance-focused but changes low-level system behavior. It will NOT prevent your PC from booting, and can be reverted anytime via the Undo button.',
     apply:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management" /v LargeSystemCache /t REG_DWORD /d 1 /f`,
     revert:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management" /v LargeSystemCache /t REG_DWORD /d 0 /f`},
    {id:'prefetch-off',icon:'🗃️',name:'Disable Prefetch & ReadyBoost',badges:['perf','mem','disk'],
     impact:`Prefetch and ReadyBoost maintain a cache of recently used application data on disk, performing background disk I/O to keep it ready. On SSDs this is completely pointless — SSD random access is already fast enough that the cache offers zero benefit, while the background I/O creates disk activity that competes with game asset streaming.`,
     desc:'CS2 map loading and Valorant texture streaming both involve disk I/O. Prefetch\'s background disk writes compete with this I/O during map loads and asset streaming. Disabling prefetch eliminates this competition, allowing CS2 and Valorant to use 100% of your SSD\'s bandwidth for actual game asset loading.',
     apply:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management\\PrefetchParameters" /v EnablePrefetcher /t REG_DWORD /d 0 /f\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management\\PrefetchParameters" /v EnableSuperfetch /t REG_DWORD /d 0 /f`,
     revert:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management\\PrefetchParameters" /v EnablePrefetcher /t REG_DWORD /d 3 /f\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management\\PrefetchParameters" /v EnableSuperfetch /t REG_DWORD /d 1 /f`},
    {id:'pagefile-fixed',icon:'📎',name:'Set Fixed PageFile Size (No Dynamic Resize)',badges:['perf','mem'],
     impact:`A dynamic pagefile resizes itself constantly as memory usage changes. Each resize is a disk I/O operation that can momentarily stall processes waiting for virtual memory. A fixed pagefile at a consistent size eliminates resize operations entirely, ensuring consistent virtual memory performance throughout a gaming session.`,
     desc:'CS2 memory usage grows over a long session as more map areas are visited and more assets are cached. A dynamic pagefile growing to accommodate this triggers disk I/O at the worst moments. A fixed pagefile pre-allocates the space, eliminating resize-induced latency spikes in the middle of competitive matches.',
     apply:`REM Set pagefile to fixed 16GB (wmic removed in Win11 24H2, using PowerShell):\npowershell -Command \"$cs = Get-WmiObject Win32_ComputerSystem; $cs.AutomaticManagedPagefile = $false; $cs.Put()\"\npowershell -Command \"Get-WmiObject Win32_PageFileSetting | Remove-WmiObject\"\npowershell -Command \"Set-WMIInstance -Class Win32_PageFileSetting -Arguments @{Name=\\\"C:\\\\pagefile.sys\\\"; InitialSize=16384; MaximumSize=16384}\"\nREM Restart required after this change`,
     revert:`powershell -Command \"$cs = Get-WmiObject Win32_ComputerSystem; $cs.AutomaticManagedPagefile = $true; $cs.Put()\"\nREM Restart required`},
    {id:'working-set',icon:'🔬',name:'Disable Process Working Set Trim',badges:['perf','mem'],
     impact:`Windows can page out game memory to disk even when you have free RAM, as part of its memory prediction system. CS2 and Valorant are memory-locked applications — having any part of the game swapped to disk means a disk read (even SSD) when that memory is accessed, causing multi-millisecond stutters.`,
     desc:'CS2 mid-match stutters on systems with 16GB RAM often come from Windows paging out game assets to make room for \'predicted\' future uses. Setting process working sets prevents this — the game\'s memory stays locked in RAM throughout the match, eliminating page fault stutters.',
     apply:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management" /v DisablePagingExecutive /t REG_DWORD /d 1 /f`,
     revert:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management" /v DisablePagingExecutive /t REG_DWORD /d 0 /f`},
    {id:'heap-opt',icon:'📊',name:'Optimize System Heap & Pool Allocations',badges:['perf','mem'],
     impact:`The Windows heap allocator's default settings don't optimize for the allocation pattern of game engines — frequent small allocations and deallocations. HeapDeCommitFreeBlockThreshold and related settings tune when the heap returns memory to the OS vs keeping it ready for reuse, reducing allocation latency for game engine memory operations.`,
     desc:'CS2 and Valorant\'s game engines create and destroy thousands of small objects per second — bullets, effects, sound sources. Heap allocator overhead on these operations adds CPU time that accumulates over millions of allocations per match. Optimized heap settings reduce this overhead, particularly on CPU-bound systems.',
     apply:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager" /v HeapDeCommitFreeBlockThreshold /t REG_DWORD /d 262144 /f\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management" /v PoolUsageMaximum /t REG_DWORD /d 60 /f`,
     revert:`reg delete "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager" /v HeapDeCommitFreeBlockThreshold /f\nreg delete "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management" /v PoolUsageMaximum /f`},
    {id:'ram-timing',icon:'🕹️',name:'Enable XMP/EXPO RAM Profile (BIOS Reminder)',badges:['mem','perf'],
     desc:'This is the single most impactful memory change you can make. Most RAM ships running at 2133MHz even though it is rated for 3200-6000MHz+. Enabling XMP (Intel) or EXPO (AMD) in BIOS activates the rated speed. A 3200MHz to 6000MHz upgrade can give 10-30% gaming performance gains.',
     impact:`Running RAM below its rated speed is the single most common un-fixed bottleneck on gaming PCs. RAM defaulting to 2133MHz when rated for 6000MHz means 64% less memory bandwidth — every texture load, physics calculation, and game state update takes longer. In CS2, proper XMP/EXPO can increase average FPS by 15–25% and dramatically tighten 1% lows. In Valorant, it reduces the memory latency that causes the 'rubberbanding' feel on Ryzen systems.`,
     apply:`REM === BIOS SETTING — Cannot be scripted ===\nREM Restart PC > Enter BIOS (Del or F2)\nREM Look for: XMP, D.O.C.P., EXPO, or A-XMP\nREM Enable it and select the highest profile\nREM Save and exit\nREM Verify in Windows: Task Manager > Performance > Memory > Speed\nREM Should match your RAM kit rated speed`,
     revert:`REM Disable XMP/EXPO in BIOS to return to stock 2133MHz`},
    {id:'memory-compression',icon:'🗜️',name:'Disable Windows Memory Compression',badges:['mem','perf'],
     impact:`Windows memory compression uses the CPU to compress RAM pages in real-time to fit more data into physical memory. During a CS2 match this means the CPU is constantly compressing and decompressing game memory in the background. On 16GB+ systems this compression overhead costs more in CPU time than it saves in memory.`,
     desc:'CS2 and Valorant both benefit from having their working set uncompressed and ready in RAM. Memory compression means every page access might require a decompression operation before the data is usable. On 16GB+ systems where there\'s sufficient physical RAM, disabling compression eliminates this decompression overhead entirely.',
     apply:`powershell -Command "Disable-MMAgent -MemoryCompression"`,
     revert:`powershell -Command "Enable-MMAgent -MemoryCompression"`},
    {id:'standby-list',icon:'🗑️',name:'Auto-Clear Standby Memory List',badges:['mem','perf'],
     impact:`Windows keeps recently used memory in a 'standby list' rather than freeing it immediately. This sounds efficient but means CS2 and Valorant compete with cached data for RAM. When the standby list is full, CS2 requesting new memory must wait for Windows to evict standby pages first — creating RAM allocation stalls.`,
     desc:'CS2 map loading requires large contiguous RAM allocations. If the standby list is consuming RAM with cached data from before your game session, CS2\'s map allocation must wait for Windows to clear standby pages. Clearing the standby list before gaming gives CS2 and Valorant immediate access to all available physical RAM.',
     apply:`REM Download RAMMap (free, from Sysinternals/Microsoft)\nREM Then create a scheduled task to flush standby:\nREM schtasks /create /tn "FlushStandby" /tr "RAMMap.exe -Es" /sc MINUTE /mo 30 /f\nREM\nREM OR use the EmptyStandbyList tool (also free):\nREM schtasks /create /tn "FlushStandby" /tr "EmptyStandbyList.exe workingsets" /sc MINUTE /mo 15 /f`,
     revert:`schtasks /delete /tn "FlushStandby" /f`},
    {id:'ram-dual-channel',icon:'🔀',name:'Verify Dual Channel RAM Configuration (Guide)',badges:['mem','perf'],
     impact:`Dual-channel RAM effectively doubles your memory bandwidth by using two sticks in the correct DIMM slots. For integrated graphics this is critical, but it also matters for CPUs with large L3 caches (like AMD 3D V-Cache) where game data that doesn't fit in cache goes to RAM. Single-channel RAM halves the bandwidth available for these cache misses.`,
     desc:'CS2 and Valorant both fit mostly in CPU cache on modern processors, but cache misses still go to RAM. With single-channel RAM, each cache miss takes twice as long to resolve. On Ryzen systems especially, dual-channel RAM paired with FCLK tuning provides the full memory bandwidth the Infinity Fabric needs.',
     apply:`REM CHECK CURRENT STATUS:\nREM Task Manager > Performance > Memory > "Speed"\nREM If it says your RAM speed but looks slow in benchmarks:\nREM Run CPU-Z > Memory tab — check "Channels #"\nREM Should say "Dual" not "Single"\nREM\nREM FIX: Power off, remove RAM, reseat in correct slots\nREM Consult motherboard manual for dual-channel slots\nREM Typically: slots 2 and 4 (not 1 and 2)`,
     revert:`REM No software revert — physical RAM slot change`},
    {id:'virtual-memory-location',icon:'📂',name:'Move PageFile to Fastest Drive',badges:['mem','perf'],
     impact:`The pagefile (virtual memory) should be on your fastest drive. When Windows pages memory out — even rarely — accessing it on a slow drive adds hundreds of milliseconds of stall time. On systems with multiple drives, moving the pagefile to the NVMe ensures that the rare pagefile access is as fast as possible.`,
     desc:'If CS2 or Valorant ever presses against the physical RAM limit and Windows pages some game data, that page being on a slow HDD causes a multi-second stall while the data is read back. On the fastest NVMe, the same page-in takes ~1ms. Always put the pagefile on your fastest drive.',
     apply:`REM Move pagefile to fastest NVMe drive (change D: to your drive letter):\npowershell -Command \"$cs = Get-WmiObject Win32_ComputerSystem; $cs.AutomaticManagedPagefile = $false; $cs.Put()\"\nREM Remove pagefile from C: drive:\npowershell -Command \"Get-WmiObject Win32_PageFileSetting | Remove-WmiObject\"\nREM Create on NVMe D: drive:\npowershell -Command \"Set-WMIInstance -Class Win32_PageFileSetting -Arguments @{Name=\\\"D:\\\\pagefile.sys\\\"; InitialSize=16384; MaximumSize=16384}\"\nREM Restart required`,
     revert:`powershell -Command \"$cs = Get-WmiObject Win32_ComputerSystem; $cs.AutomaticManagedPagefile = $true; $cs.Put()\"\nREM Restart required`}
  ],
  input: [
    {id:'mouse-accel',icon:'🖱️',name:'Disable Mouse Acceleration',badges:['latency'],
     impact:`Mouse acceleration makes slow movements slower and fast movements faster, applying a speed multiplier to every mouse input. In CS2 and Valorant, muscle memory for flick shots depends on the distance-to-aim relationship being consistent. Acceleration breaks this consistency — the same physical wrist movement produces different crosshair travel depending on speed.`,
     desc:'CS2 pros universally disable mouse acceleration. Your crosshair should move exactly proportionally to your mouse movement, at any speed. With acceleration, a slow 180-degree turn and a fast 180-degree turn require different physical movements. Disabling ensures muscle memory is transferable and consistent.',
     apply:`reg add "HKCU\\Control Panel\\Mouse" /v MouseSpeed /t REG_SZ /d "0" /f\nreg add "HKCU\\Control Panel\\Mouse" /v MouseThreshold1 /t REG_SZ /d "0" /f\nreg add "HKCU\\Control Panel\\Mouse" /v MouseThreshold2 /t REG_SZ /d "0" /f`,
     revert:`reg add "HKCU\\Control Panel\\Mouse" /v MouseSpeed /t REG_SZ /d "1" /f\nreg add "HKCU\\Control Panel\\Mouse" /v MouseThreshold1 /t REG_SZ /d "6" /f\nreg add "HKCU\\Control Panel\\Mouse" /v MouseThreshold2 /t REG_SZ /d "10" /f`},
    {id:'pointer-precision',icon:'🎯',name:'Disable Enhance Pointer Precision & HID Ballistics',badges:['latency'],
     impact:`Enhance Pointer Precision is Windows mouse acceleration with a different name. It applies a ballistic curve to mouse movement that makes slow movements feel more precise but ruins consistency for gaming. In CS2, the same crosshair placement attempt will land differently depending on how fast you moved your mouse to get there.`,
     desc:'CS2\'s m_mousespeed 0 and m_mouseaccel 0 commands disable in-game acceleration, but Enhance Pointer Precision operates at the OS level before game input is received. Even with in-game acceleration disabled, Pointer Precision can still affect your input if not disabled here. This registry change ensures it\'s fully off at the OS level.',
     apply:`reg add "HKCU\\Control Panel\\Mouse" /v MouseSpeed /t REG_SZ /d "0" /f\nreg add "HKCU\\Control Panel\\Mouse" /v SmoothMouseXCurve /t REG_BINARY /d 0000000000000000C0CC0C0000000000809919000000000040662600000000000023340000000000 /f\nreg add "HKCU\\Control Panel\\Mouse" /v SmoothMouseYCurve /t REG_BINARY /d 0000000000000000000038000000000000007000000000000000A8000000000000C0E000000000 /f`,
     revert:`reg delete "HKCU\\Control Panel\\Mouse" /v SmoothMouseXCurve /f\nreg delete "HKCU\\Control Panel\\Mouse" /v SmoothMouseYCurve /f`},
    {id:'keyboard-delay',icon:'⌨️',name:'Minimize Keyboard Input Delay',badges:['latency'],
     impact:`Keyboard delay and repeat rate affect how quickly keypresses register in games. KeyboardDelay=0 eliminates the 250ms initial delay before key repeat starts. In CS2, this affects how quickly you can spam keys in the buy menu, how responsive weapon switches feel, and the timing of jump-throw binds that require precise key timing.`,
     desc:'CS2 jump-throw timing requires the jump and throw inputs to be processed within specific frame windows. Default keyboard settings add a 250ms repeat delay that, while not directly affecting single keypresses, can interfere with rapid key sequences. KeyboardDelay=0 ensures the most responsive keyboard behavior for these timing-sensitive inputs.',
     apply:`reg add "HKCU\\Control Panel\\Keyboard" /v KeyboardDelay /t REG_SZ /d "0" /f\nreg add "HKCU\\Control Panel\\Keyboard" /v KeyboardSpeed /t REG_SZ /d "31" /f`,
     revert:`reg add "HKCU\\Control Panel\\Keyboard" /v KeyboardDelay /t REG_SZ /d "1" /f\nreg add "HKCU\\Control Panel\\Keyboard" /v KeyboardSpeed /t REG_SZ /d "15" /f`},
    {id:'mouse-polling',icon:'⚡',name:'Maximize Mouse HID Queue Priority',badges:['latency'],
     impact:`HID queue priority controls how quickly Windows processes mouse hardware reports from the USB HID stack. Higher priority means mouse movement data is delivered to CS2 and Valorant faster after the hardware sends its position report — reducing the latency between physical mouse movement and the game receiving the updated position.`,
     desc:'At 1000Hz polling, your mouse sends a position report every 1ms. Default HID queue priority means this report might wait behind other HID devices in the processing queue. Raising mouse HID priority ensures the game receives position updates at exactly the polling interval, not later due to queue delays.',
     apply:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Services\\mouclass\\Parameters" /v MouseDataQueueSize /t REG_DWORD /d 16 /f`,
     revert:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Services\\mouclass\\Parameters" /v MouseDataQueueSize /t REG_DWORD /d 100 /f`},
  
    {id:'usb-suspend',icon:'🖱️',name:'Disable USB Selective Suspend (Eliminate Mouse Wake Latency)',badges:['latency','input'],
     impact:`USB Selective Suspend allows Windows to cut power to USB ports during brief idle periods to save power. When your mouse moves after the port has suspended, Windows must wake the port first — adding 1–5ms of wake latency before your first movement packet is even read. This is the hidden cause of "first movement" input lag that many players feel as sluggishness after moments of stillness. Disabling it keeps all USB ports live at all times.`,
     desc:'Windows USB Selective Suspend powers down USB ports during idle moments. Mouse movement after a brief still period incurs 1–5ms port wake latency before the first movement packet is processed. Disabling ensures your mouse always has an active connection with zero wake delay.',
     apply:`@echo off
REM OPTI — Disable USB Selective Suspend
REM Eliminates USB port wake latency on mouse/keyboard
REM Run as Administrator

echo [1/2] Disabling USB selective suspend via registry...
reg add "HKLM\\SYSTEM\\CurrentControlSet\\Services\\USB" /v "DisableSelectiveSuspend" /t REG_DWORD /d 1 /f

echo [2/2] Disabling via power plan settings...
powercfg /setacvalueindex scheme_current 2a737441-1930-4402-8d77-b2bebba308a3 48e6b7a6-50f5-4782-a5d4-53bb8f07e226 0
powercfg /setdcvalueindex scheme_current 2a737441-1930-4402-8d77-b2bebba308a3 48e6b7a6-50f5-4782-a5d4-53bb8f07e226 0
powercfg /setactive scheme_current

echo.
echo USB selective suspend disabled. No reboot needed.
echo Your USB mouse and keyboard will never sleep.
pause`,
     revert:`@echo off
reg delete "HKLM\\SYSTEM\\CurrentControlSet\\Services\\USB" /v "DisableSelectiveSuspend" /f 2>nul
powercfg /setacvalueindex scheme_current 2a737441-1930-4402-8d77-b2bebba308a3 48e6b7a6-50f5-4782-a5d4-53bb8f07e226 1
powercfg /setdcvalueindex scheme_current 2a737441-1930-4402-8d77-b2bebba308a3 48e6b7a6-50f5-4782-a5d4-53bb8f07e226 1
powercfg /setactive scheme_current
echo USB selective suspend restored.
pause`},
    {id:'raw-input-buffer',icon:'🖱️',name:'Enable Raw Input Buffer (CS2 / Source Engine)',style:'ic',badges:['input','latency'],
     impact:`CS2's raw input buffer collects all mouse events since the last frame and processes them together, reducing the number of Windows message queue reads. This reduces input processing overhead and ensures no mouse movement is lost between frames at high polling rates (1000-8000Hz mice).`,
     desc:'CS2 supports a raw input buffer mode that bypasses the Windows message queue for mouse input. At high polling rates (1000Hz+), the message queue can become a bottleneck as the game reads it once per frame. Raw input buffer mode reads all accumulated events in a single batch, reducing latency and ensuring all micro-movements are captured.',
     apply:`REM CS2 Launch Option — add to Steam:
REM Right-click CS2 > Properties > Launch Options:
REM -rawinput
REM
REM Also enable in CS2 console:
REM m_rawinput 1
REM
REM Verify with: m_rawinput (should show 1)`,
     revert:`REM Remove -rawinput from CS2 Launch Options
REM Or in console: m_rawinput 0`}
  ],
  general: [

    {id:'shader-cache',icon:'🗄️',name:'Maximize GPU Shader Cache (No Limit)',style:'gc',badges:['fps','gpu','perf'],
     impact:`Eliminates the 1-5 second freeze stutter in CS2 when entering Mirage mid or Valorant Haven B-site for the first time. Shader cache eviction is the #1 cause of first-round stutter spikes.`,
     desc:'Windows caps GPU shader cache at ~10GB. When full, compiled shaders get evicted and must recompile on the fly — causing those 1-5 second freeze stutters in new areas. In CS2 this shows up as mid-round hitches when a smoke or molotov renders for the first time. Enabling unlimited cache eliminates this permanently.',
     apply:`reg add "HKLM\\SOFTWARE\\Microsoft\\DirectX\\UserGpuPreferences" /v DirectXUserGlobalSettings /t REG_SZ /d "VRROptimizeEnable=0;SwapEffectUpgradeEnable=1;" /f\nreg add "HKCU\\SOFTWARE\\Microsoft\\DirectX\\UserGpuPreferences" /v DirectXUserGlobalSettings /t REG_SZ /d "VRROptimizeEnable=0;SwapEffectUpgradeEnable=1;" /f`,
     revert:`reg delete "HKLM\\SOFTWARE\\Microsoft\\DirectX\\UserGpuPreferences" /v DirectXUserGlobalSettings /f\nreg delete "HKCU\\SOFTWARE\\Microsoft\\DirectX\\UserGpuPreferences" /v DirectXUserGlobalSettings /f`},
    {id:'process-isolate',icon:'🔒',name:'Boost Foreground App CPU Priority',style:'gc',badges:['perf','latency'],
     impact:`CS2 and Valorant get maximum CPU time. Background tasks like Discord voice, Chrome, and Steam stop stealing CPU cycles mid-round. Frame timing becomes more consistent.`,
     desc:'Win32PrioritySeparation=38 gives the foreground app maximum CPU time quantum and extends it. Background tasks like Discord, browsers, and launchers get a fraction of the CPU time they normally steal. Most noticeable in CS2 during smokes and nades when the CPU is already loaded.',
     apply:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\PriorityControl" /v Win32PrioritySeparation /t REG_DWORD /d 38 /f`,
     revert:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\PriorityControl" /v Win32PrioritySeparation /t REG_DWORD /d 2 /f`},
    {id:'no-hibernation-g',presetExclude:true,risky:true,riskNote:'Do NOT apply while Enable Fast Startup is active. Fast Startup requires the hiberfile. Disabling hibernation while Fast Startup is on causes recovery screen on next boot. Disable Fast Startup first.',icon:'😴',name:'Disable Hibernation (Clean GPU Driver State)',style:'gc',badges:['perf'],
     impact:`Prevents the GPU driver from loading a stale state on boot which can cause CS2 crashes, black screens, and inconsistent frame times in the first game session.`,
     desc:'Fast Startup keeps a partial OS state on disk which causes driver initialization issues and GPU state corruption on boot. Disabling ensures a completely clean OS and GPU driver state every single boot — especially important after driver updates.',
     apply:`powercfg /h off\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Power" /v HiberbootEnabled /t REG_DWORD /d 0 /f`,
     revert:`powercfg /h on\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Power" /v HiberbootEnabled /t REG_DWORD /d 1 /f`},
    {id:'irq-priority-g',icon:'🔔',name:'Prioritize GPU Interrupts over Audio',style:'gc',badges:['gpu','latency'],
     impact:`Stops Discord notification sounds and in-game audio from interrupting GPU render frames. The micro-stutter that happens exactly when a grenade explodes in CS2 is often caused by this.`,
     desc:'Audio device IRQs can pre-empt GPU interrupts causing micro-stutters when sounds fire during heavy GPU frames. In CS2 this appears as a 1-2ms frame spike every time a gun fires or nade lands. Raising the GPU PCI latency timer prevents audio from interrupting the render pipeline.',
     apply:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Class\\{4d36e968-e325-11ce-bfc1-08002be10318}\\0000" /v "PciLatencyTimerControl" /t REG_DWORD /d 248 /f`,
     revert:`reg delete "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Class\\{4d36e968-e325-11ce-bfc1-08002be10318}\\0000" /v "PciLatencyTimerControl" /f`},
    {id:'no-ecoqos',icon:'🔥',name:'Disable EcoQoS / Efficiency Mode Throttle',style:'gc',badges:['perf','cpu'],
     impact:`Prevents Windows from throttling your CPU mid-round. On Windows 11, Discord running in the background can accidentally trigger efficiency mode on your CPU, dropping clock speeds by 20-40% during the most intense firefights.`,
     desc:'Windows 11 can throttle CPU frequency for background apps via EcoQoS. The problem: this thermal mitigation can spill over and affect adjacent processes including your game. Valorant is especially affected since Vanguard runs a kernel-level service that EcoQoS sometimes misclassifies.',
     apply:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Power\\EnergyEstimation\\TaggedEnergy" /v ThermalMitigationOff /t REG_DWORD /d 1 /f`,
     revert:`reg delete "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Power\\EnergyEstimation\\TaggedEnergy" /v ThermalMitigationOff /f`},
    {id:'no-notification-g',icon:'🔕',name:'Disable Notification Toast Overlays',style:'gc',badges:['perf','gpu'],
     impact:`Every Discord ping or Steam notification causes the DWM to grab GPU resources for 8-20ms to render the overlay. In a Valorant clutch round this shows as a visible frame hitch exactly when you can't afford it.`,
     desc:'Windows toast notifications cause the Desktop Window Manager to grab GPU resources to render the overlay. The GPU context switch happens on the main render thread, which is why notifications cause frame drops rather than a smooth overlay. Disabling removes this entirely — use Do Not Disturb in Discord instead.',
     apply:`reg add "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\PushNotifications" /v ToastEnabled /t REG_DWORD /d 0 /f\nreg add "HKCU\\SOFTWARE\\Policies\\Microsoft\\Windows\\CurrentVersion\\PushNotifications" /v NoToastApplicationNotification /t REG_DWORD /d 1 /f`,
     revert:`reg add "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\PushNotifications" /v ToastEnabled /t REG_DWORD /d 1 /f\nreg delete "HKCU\\SOFTWARE\\Policies\\Microsoft\\Windows\\CurrentVersion\\PushNotifications" /v NoToastApplicationNotification /f`},
  
    {id:'game-process-priority',icon:'🎮',name:'Auto-Set Game Process Priority to High (IFEO)',badges:['perf','latency'],
     impact:`Windows schedules all user processes at Normal priority by default. Your game competes equally with Discord, a browser tab checking for updates, and your antivirus scanner for CPU time. Setting game process priority to High via Image File Execution Options makes Windows always schedule CS2 and Valorant threads ahead of normal-priority background processes — reducing frame time variance caused by the scheduler giving away CPU cycles mid-frame.`,
     desc:'Uses Image File Execution Options to permanently set CS2 and Valorant process priority to High at launch — no launcher or third-party tool needed. High priority (not Real-Time) gives game threads scheduling preference over all normal background processes without breaking the Windows scheduler.',
     apply:`@echo off
REM OPTI — Auto High Priority for CS2 and Valorant via IFEO
REM Sets process priority at launch without any launcher needed
REM Run as Administrator

echo Setting CS2 to High priority on launch...
reg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Image File Execution Options\\cs2.exe\\PerfOptions" /v "CpuPriorityClass" /t REG_DWORD /d 3 /f

echo Setting Valorant to High priority on launch...
reg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Image File Execution Options\\VALORANT-Win64-Shipping.exe\\PerfOptions" /v "CpuPriorityClass" /t REG_DWORD /d 3 /f

echo.
echo Done. Priority 3 = High (below Real-Time, above Normal).
echo Both games will launch at High priority automatically from now on.
pause`,
     revert:`@echo off

    {id:'steam-overlay',icon:'🎮',name:'Steam — Disable Overlay & Download During Play',style:'gc',badges:['perf','fps'],

  cs2: [
    {id:'cs2-launch',icon:'🚀',name:'CS2 Launch Options (2024 Verified)',style:'cc',badges:['cs2','fps','latency'],
     impact:`Saves 5 sec per launch, sets process priority before the game even loads. -nojoy stops gamepad polling stealing CPU cycles between shots.`,
     desc:'Verified CS2 launch options for 2024. -novid skips the intro video. -nojoy disables gamepad polling overhead. -high sets High process priority at launch. Many old CS:GO options like -threads, -processheap, and +mat_queue_mode are either ignored by Source 2 or cause crashes — they are intentionally excluded here.',
     apply:`REM Steam > Library > Right-click CS2 > Properties > Launch Options:\nREM Paste exactly:\n-novid -nojoy -high\n\nREM OPTIONAL — 4:3 stretched (wider player models, more FPS):\n-novid -nojoy -high -w 1280 -h 960\n\nREM REMOVED — these DO NOT work in CS2:\nREM -threads (ignored), +mat_queue_mode (ignored)\nREM -processheap (causes crashes), -nod3d9ex (not applicable)`,
     revert:`REM Steam > CS2 Properties > Launch Options > clear the field`},
    {id:'cs2-autoexec',icon:'📝',name:'CS2 autoexec.cfg — Verified 2024 Commands',style:'cc',badges:['cs2','fps','latency'],
     impact:`rate 786432 maxes the data CS2 requests from Valve servers every sub-tick update — lower values cause enemies to visually skip positions. engine_low_latency_sleep_after_client_tick reduces dead CPU time between game ticks so your inputs are processed faster.`,
     desc:'Complete autoexec.cfg with only commands verified to work in CS2 on Source 2. Old CS:GO cvars (cl_cmdrate, cl_updaterate, mat_queue_mode) have been removed — they are silently ignored and using them gives a false sense of optimization. This covers FPS cap, network, raw input, HUD scaling, and audio.',
     apply:`REM File location:\nREM C:\\Program Files (x86)\\Steam\\steamapps\\common\\\nREM Counter-Strike Global Offensive\\game\\csgo\\cfg\\autoexec.cfg\nREM\nREM --- FPS & Rendering ---\nfps_max 0\ncl_showfps 0\nengine_low_latency_sleep_after_client_tick true\nr_low_latency 2\n\nREM --- Network (sub-tick optimized) ---\nrate 786432\ncl_interp_ratio 1\ncl_interp 0.03125\n\nREM --- Input ---\nm_rawinput 1\nm_mousespeed 0\nm_mouseaccel1 0\nm_mouseaccel2 0\n\nREM --- HUD ---\ncl_hud_radar_scale 1.15\nhud_scaling 0.85\ncl_teammate_colors_show 2\n\nREM --- Audio ---\nsnd_mixahead 0.05\nsnd_musicvolume 0\n\nREM Must end with:\nexec autoexec`,
     revert:`REM Delete autoexec.cfg or clear its contents`},
    {id:'cs2-fps-cap',icon:'🎯',name:'CS2 FPS Cap — Optimal Value by Monitor',style:'cc',badges:['cs2','latency','fps'],
     impact:`Uncapped FPS is the #1 cause of input lag in CS2. At 400+ FPS the GPU builds a queue of 3-4 unshown frames — each one sitting between your mouse click and what appears on screen. Capping at Hz+20 keeps the queue at 0-1 frames, cutting system latency by 8-16ms. This is why pros always cap even on 360Hz monitors.`,
     desc:'When FPS exceeds monitor refresh rate, the GPU renders frames faster than they can be shown. These pile up in a flip queue adding delay between input and display. Cap at Hz+20 to keep exactly zero queue buildup while keeping the GPU clock speed pinned to peak performance. Setting fps_max 0 (uncapped) is always wrong for competitive play.',
     apply:`REM Add to autoexec.cfg:\nfps_max 164\nREM\nREM VALUES BY MONITOR:\nREM 60Hz  → fps_max 80\nREM 144Hz → fps_max 164\nREM 165Hz → fps_max 185\nREM 240Hz → fps_max 260\nREM 280Hz → fps_max 300\nREM 360Hz → fps_max 380\nREM\nREM Why Hz+20? Keeps render queue always empty\nREM but GPU stays at full clock speed (no thermal throttle)\nREM\nREM Steam Launch Option alternative:\nREM +fps_max 164`,
     revert:`REM Console or autoexec.cfg:\nfps_max 0`},
    {id:'cs2-network',icon:'📡',name:'CS2 Network — Sub-Tick Optimized Settings',style:'cc',badges:['cs2','net','latency'],
     impact:`CS2 sub-tick records your exact input timestamp between server ticks. With rate too low, positional updates arrive in bursts and enemies appear to teleport between frames. rate 786432 + interp_ratio 1 gives you the smoothest possible position updates and most accurate hit registration.`,
     desc:'CS2 replaced 64/128 tick with sub-tick — meaning player inputs are timestamped exactly when they happen rather than at a fixed tick boundary. The server still sends position updates at a tick rate, but your inputs register at sub-tick precision. Rate controls bandwidth; lower rate = coarser position data = worse hit reg even at low ping.',
     apply:`REM In CS2 console (~) or autoexec.cfg:\nrate 786432\ncl_interp_ratio 1\ncl_interp 0.03125\n\nREM VERIFY in-game:\nREM cl_interp_ratio → should be 1\nREM cl_interp → should be 0.031250\nREM cl_shownet 1 → verify network graph\nREM\nREM DEAD CS:GO COMMANDS — do NOT use:\nREM cl_cmdrate, cl_updaterate, cl_lagcompensation\nREM (removed from CS2 entirely)`,
     revert:`rate 196608\ncl_interp_ratio 2\ncl_interp 0.0625`},
    {id:'cs2-low-latency',icon:'⚡',name:'CS2 Source 2 Low Latency Mode',style:'cc',badges:['cs2','latency'],
     impact:`r_low_latency 2 cuts 1-3ms of render pipeline depth so each frame starts rendering closer to when it will be displayed. engine_low_latency_sleep_after_client_tick stops the CPU from burning cycles in a spin-wait between ticks. Stack this with fps_max Hz+20 for the lowest possible input-to-display delay.`,
     desc:'Source 2 has two native low latency modes. engine_low_latency_sleep_after_client_tick replaces a CPU spin-wait with a proper yield, freeing those cycles for actual game simulation. r_low_latency 2 reduces the renderer pipeline depth — meaning fewer frames are "in flight" at once, at the cost of 1-2 FPS.',
     apply:`REM Console or autoexec.cfg:\nengine_low_latency_sleep_after_client_tick true\nr_low_latency 2\n\nREM r_low_latency values:\nREM 0 = off\nREM 1 = low latency\nREM 2 = lowest latency (costs ~1-2 FPS — use this)\nREM\nREM Stack with: fps_max [Hz+20] for best result\nREM Do NOT combine with VSync`,
     revert:`engine_low_latency_sleep_after_client_tick false\nr_low_latency 0`},
    {id:'cs2-process',icon:'🔲',name:'CS2 High Priority via Registry (Auto on Launch)',style:'cc',badges:['cs2','latency','perf'],
     impact:`CS2 gets CPU time before every process on the machine — automatically, every launch. The frame hitches caused by a Discord message arriving or Windows Defender doing a background scan disappear because the OS scheduler always returns to CS2 first.`,
     desc:'Sets CS2 to High CPU priority and High I/O priority via IFEO (Image File Execution Options) in the registry. Persists every launch without needing a script. Vanguard-equivalent: Valorant uses the same registry path for its own priority setting.',
     apply:`reg add \"HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Image File Execution Options\\cs2.exe\\PerfOptions\" /v CpuPriorityClass /t REG_DWORD /d 3 /f\nreg add \"HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Image File Execution Options\\cs2.exe\\PerfOptions\" /v IoPriority /t REG_DWORD /d 3 /f\nREM Verify: Launch CS2 > Task Manager > Details > cs2.exe priority = High`,
     revert:`reg delete \"HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Image File Execution Options\\cs2.exe\" /f`},
    {id:'cs2-shader-warmup',icon:'🔥',name:'CS2 Shader Warmup — Eliminate Round 1 Stutter',style:'cc',badges:['cs2','fps'],
     impact:`The first time a smoke grenade, molotov, or flashbang renders in CS2, DirectX compiles its shader variant on-the-spot — freezing your game for 200-800ms. Shader warmup pre-compiles all effects in a safe environment so this never happens mid-round. This fixes the stutter that happens on round 2 of every first match after a patch.`,
     desc:'Even after Steam background shader pre-compilation, CS2 compiles game-specific shader permutations for your exact GPU+driver combo on first render. Warmup triggers this compilation in a bot match environment. Clear the DirectX cache monthly — corrupted shader cache entries cause persistent micro-stutters that no other tweak can fix.',
     apply:`REM METHOD 1 — Built-in warmup (do after every CS2 update):\nREM CS2 > Settings > Video > Shader Warmup button\nREM Wait for 100% — do NOT skip\nREM Then play 1 bot match on Dust2 before going ranked\n\nREM METHOD 2 — Clear corrupted DirectX shader cache:\ndel /f /s /q "%LOCALAPPDATA%\\\\D3DSCache\\\\*"\nREM Restart PC, then run Method 1 again\n\nREM METHOD 3 — Steam shader pre-cache:\nREM Steam > Settings > Downloads > Shader Pre-Caching = ON`,
     revert:`REM No revert needed — warmup only pre-compiles shaders`},
    {id:'cs2-interp',icon:'👁️',name:"CS2 Peeker's Advantage — Minimize Interp Delay",style:'cc',badges:['cs2','net','latency'],
     desc:'cl_interp sets how far behind server-time your client renders player positions. Higher values smooth out packet loss but increase the gap between where you see enemies and where they actually are on the server. Lower values reduce this gap for more accurate peeker registration.',
     impact:`Every millisecond of cl_interp is time your client is running behind server reality. When a player peeks a corner, your client shows them slightly behind where they actually are on the server. Lower interp narrows this gap — defenders see peeks closer to real-time.`,
     desc:"Peeker's advantage exists because both clients interpolate positions slightly behind server time. The defender's client shows the attacker behind their actual server position. cl_interp controls how far behind you are. At cl_interp 0 the engine automatically picks the minimum possible value. Only use 0 if your ping is under 40ms consistently.",
     apply:`REM For low-ping (under 40ms) — add to autoexec.cfg:\ncl_interp 0\ncl_interp_ratio 1\n\nREM cl_interp 0 = engine uses minimum automatically\nREM Minimum = 1 / server_tickrate (~6.25ms)\nREM\nREM For higher ping (40-80ms):\ncl_interp 0.03125\ncl_interp_ratio 1\nREM\nREM Verify: cl_interp in console — should show engine minimum\nREM Do NOT use cl_interp_ratio 2 (doubles your interpolation delay)`,
     revert:`cl_interp_ratio 2\ncl_interp 0.0625`},
    {id:'cs2-net-graph',icon:'📊',name:'CS2 Network Diagnostics — Identify Lag Cause',style:'cc',badges:['cs2','net','ping'],
     desc:'Enables CS2 real-time network diagnostic overlay. Shows ping, packet loss, choke, and frame variance in-game. Use this to diagnose whether your lag is from internet routing, server load, or your own PC frame timing.',
     impact:`Shows real-time graph of your ping, packet loss, choke, and latency variance. Use this to diagnose whether lag spikes are from your ISP routing (high ping), CS2 server (choke), or your PC (high var). Fixes the wrong problem 90% less often once you know the actual cause.`,
     desc:"CS2's net_graph replacement lets you see live network health. Choke means the server is dropping your packets (usually server-side). Loss means packets are lost in transit (ISP or routing issue). Var is frame-time variance — high var means your PC's frame timing is inconsistent rather than network problems.",
     apply:`REM In CS2 console (~):\ncl_shownet 2\n\nREM Explanation of values:\nREM ping   = round-trip time to server (target: under 30ms)\nREM loss   = % packets lost in transit (target: 0%)\nREM choke  = % packets server dropped (target: 0%)\nREM var    = frame time variance (target: under 2ms)\nREM\nREM Quick diagnosis:\nREM High ping only    = ISP routing issue → use Route Optimizer\nREM High choke        = server overloaded or your rate too low\nREM High loss         = cable/ISP issue\nREM High var, low ping = PC-side frame timing → use CPU/GPU tweaks\nREM\nREM To disable the graph:\ncl_shownet 0`,
     revert:`cl_shownet 0`},

    {id:'cs2-nic-interrupt',icon:'⚡',name:'Disable NIC Interrupt Moderation (Save 1–2ms)',
     badges:['latency','net','cs2'],
     desc:'NIC interrupt moderation batches network interrupts to reduce CPU load — but introduces up to 2ms of artificial delay before your NIC tells the CPU a packet arrived. For CS2 sub-tick packets, this batching delay directly increases ping variance. Disabling it makes each packet fire an immediate interrupt.',
     impact:'Your NIC groups multiple packet interrupts into one batch. For bulk file transfers this saves CPU. For CS2 at 128-tick sub-tick, it adds 1–2ms of hidden latency before the engine sees the packet. At 9ms when you should be 3ms, this is likely a major contributor to the gap.',
     apply:`@echo off
REM Disable NIC Interrupt Moderation — saves 1-2ms packet latency
REM Run as Administrator
echo Disabling interrupt moderation on all active ethernet adapters...
powershell -Command "Get-NetAdapter | Where-Object {$_.Status -eq 'Up' -and $_.InterfaceDescription -notlike '*Virtual*'} | ForEach-Object { try { Set-NetAdapterAdvancedProperty -Name $_.Name -DisplayName 'Interrupt Moderation' -DisplayValue 'Disabled' -EA Stop; Write-Host ('OK: ' + $_.Name) } catch { Write-Host ('No setting: ' + $_.Name) } }"
powershell -Command "Get-NetAdapter | Where-Object {$_.Status -eq 'Up'} | ForEach-Object { try { Set-NetAdapterAdvancedProperty -Name $_.Name -DisplayName 'Interrupt Moderation Rate' -DisplayValue 'Off' -EA Stop } catch {} }"
echo.
echo Verify: Device Manager ^> Network Adapter ^> Properties ^> Advanced ^> Interrupt Moderation = Disabled
echo Restart recommended.
pause`,
     revert:`@echo off
powershell -Command "Get-NetAdapter | Where-Object {$_.Status -eq 'Up'} | ForEach-Object { try { Set-NetAdapterAdvancedProperty -Name $_.Name -DisplayName 'Interrupt Moderation' -DisplayValue 'Enabled' -EA Stop; Write-Host ('Restored: ' + $_.Name) } catch {} }"
echo NIC interrupt moderation restored. pause`},

    {id:'cs2-audio-dpc',icon:'🔊',name:'Minimize Audio Driver DPC Latency (Save 1–3ms)',
     badges:['latency','cs2','perf'],
     desc:'Audio drivers — especially Realtek — are the #1 cause of DPC spikes on gaming PCs. A DPC spike from your audio driver can preempt the CPU thread CS2 is running on for 1–5ms. This appears as frame time spikes and increased system latency in LatencyMon. Lowers audio MMCSS priority and disables spatial audio overhead.',
     impact:'When your audio driver fires a DPC it can interrupt your CS2 thread mid-frame. Realtek HD Audio is notorious for 2–4ms DPC latency spikes. If your frame variance is high but ping is fine, audio DPC is likely the cause. Exclusive mode lets CS2 bypass the Windows audio mixer entirely.',
     apply:`@echo off
REM CS2 Audio DPC Latency Reduction
REM Reduces Realtek/audio driver DPC interrupt overhead
REM Run as Administrator
echo [1/3] Lowering audio MMCSS priority (reduces scheduler contention)...
reg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Audio" /v "Scheduling Category" /t REG_SZ /d "Medium" /f
reg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Audio" /v "SFIO Priority" /t REG_SZ /d "Normal" /f
reg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Audio" /v "Priority" /t REG_DWORD /d 1 /f
echo [2/3] Disabling spatial audio / Windows Sonic...
reg add "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Holographic" /v "FirstRunSucceeded" /t REG_DWORD /d 0 /f 2>nul
echo [3/3] Done. Manual steps below:
echo.
echo === MANUAL (biggest gains) ===
echo 1. Sound ^> right-click playback device ^> Properties
echo    Enhancements tab ^> Disable all enhancements
echo    Advanced tab ^> Exclusive Mode ^> enable both checkboxes
echo 2. If using Realtek: open Realtek Audio Console ^> disable all effects
echo 3. Run LatencyMon to confirm DPC spikes gone: resplendence.com/latencymon
echo.
pause`,
     revert:`@echo off
reg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Audio" /v "Scheduling Category" /t REG_SZ /d "Medium" /f
reg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Audio" /v "Priority" /t REG_DWORD /d 2 /f
echo Audio DPC settings reverted. Re-enable enhancements via Sound > device Properties if needed.
pause`},

    {id:'cs2-latency-stack',icon:'🎯',name:'CS2 Full Latency Stack — Target 2–3ms',
     badges:['latency','cs2','perf','net'],
     desc:'Targeted batch of registry and system changes that address the most common causes of CS2 latency sitting at 7–10ms instead of 2–3ms. Covers timer resolution, CPU idle, MMCSS game scheduling, GPU flip queue, and kernel sleep precision. Run after applying all CPU, GPU, and network tweaks.',
     impact:'Getting from 9ms to 2–3ms requires stacking multiple small wins: timer resolution (~1ms), CPU idle off (~0.5ms), MMCSS tuning (~0.5–1ms), GPU flip queue 1 (~0.5–1ms). These compound together. Pair with the NIC Interrupt Moderation and Audio DPC tweaks for maximum effect.',
     apply:`@echo off\nREM CS2 Full Latency Stack — Targets 2-3ms\nREM Run as Administrator after all CPU/GPU/network tweaks\necho [1/7] Timer resolution — force TSC (not HPET), 0.5ms quantum...\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\kernel" /v GlobalTimerResolutionRequests /t REG_DWORD /d 1 /f\nREM Delete useplatformtick so Windows uses CPU TSC (faster than HPET):\nbcdedit /deletevalue useplatformtick 2>nul\nbcdedit /set disabledynamictick no 2>nul\necho [2/7] CPU — lock to 100%% min/max (no C-state exit delay)...\npowercfg /setacvalueindex scheme_current sub_processor PROCTHROTTLEMIN 100\npowercfg /setacvalueindex scheme_current sub_processor PROCTHROTTLEMAX 100\npowercfg /setactive scheme_current\necho [3/7] MMCSS — maximize game thread precision...\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile" /v SystemResponsiveness /t REG_DWORD /d 0 /f\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games" /v "GPU Priority" /t REG_DWORD /d 8 /f\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games" /v Priority /t REG_DWORD /d 6 /f\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games" /v "Scheduling Category" /t REG_SZ /d "High" /f\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games" /v "SFIO Priority" /t REG_SZ /d "High" /f\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games" /v "Background Only" /t REG_SZ /d "False" /f\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games" /v "Clock Rate" /t REG_DWORD /d 2500 /f\necho [4/7] Network — disable packet throttling (big latency win)...\nREM NetworkThrottlingIndex=0xFFFFFFFF disables Windows throttling game packets\nREM Default (10) batches packets adding 1-4ms. Disabled = immediate delivery.\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile" /v NetworkThrottlingIndex /t REG_DWORD /d 4294967295 /f\nREM Also disable TCP auto-tuning interference:\nnetsh int tcp set global autotuninglevel=normal 2>nul\necho [5/7] GPU flip queue = 1 + DXGI max latency = 1...\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\GraphicsDrivers" /v HwFlipQueueLength /t REG_DWORD /d 1 /f\nreg add "HKLM\\SOFTWARE\\Microsoft\\DXGI" /v MaxFrameLatency /t REG_DWORD /d 1 /f\necho [6/7] Foreground app absolute CPU priority...\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\PriorityControl" /v Win32PrioritySeparation /t REG_DWORD /d 38 /f\necho [7/7] Kill residual idle tasks...\nrundll32.exe advapi32.dll,ProcessIdleTasks\necho.\necho =============================================\necho  CS2 Latency Stack Applied\necho  Expected: 2-4ms system latency\necho  Stack with: NIC Interrupt Moderation tweak\necho  Stack with: Audio DPC tweak (if Realtek)\necho  Stack with: Telemetry tweak\necho  In CS2: NVIDIA Reflex = Enabled + Boost\necho  autoexec: r_low_latency 2, fps_max [Hz+20]\necho  Verify with: LatencyMon (resplendence.com)\necho =============================================\npause`,
     revert:`@echo off\nbcdedit /deletevalue useplatformtick 2>nul\nreg delete "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\kernel" /v GlobalTimerResolutionRequests /f 2>nul\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile" /v SystemResponsiveness /t REG_DWORD /d 20 /f\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile" /v NetworkThrottlingIndex /t REG_DWORD /d 10 /f\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games" /v "GPU Priority" /t REG_DWORD /d 2 /f\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games" /v Priority /t REG_DWORD /d 2 /f\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games" /v "Scheduling Category" /t REG_SZ /d "Medium" /f\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games" /v "Clock Rate" /t REG_DWORD /d 10000 /f\nreg delete "HKLM\\SYSTEM\\CurrentControlSet\\Control\\GraphicsDrivers" /v HwFlipQueueLength /f 2>nul\nreg delete "HKLM\\SOFTWARE\\Microsoft\\DXGI" /v MaxFrameLatency /f 2>nul\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\PriorityControl" /v Win32PrioritySeparation /t REG_DWORD /d 2 /f\nnetsh int tcp set global autotuninglevel=normal 2>nul\necho CS2 latency stack reverted.\npause`},
    {id:'cs2-telemetry-diag',icon:'📉',name:'CS2 Latency Telemetry — Diagnose Your 9ms',style:'cc',badges:['cs2','latency'],
     impact:`CS2 has a built-in latency overlay that shows exactly where your 9ms is coming from. The breakdown: Input (mouse to frame start), CPU (game thread), GPU (render time), Queue (flip queue delay). 9ms usually means flip queue backpressure or GPU-bound frames. r_low_latency 2 plus NVIDIA Reflex together typically cuts this to 2–3ms.`,
     desc:'cl_showtelemetry 1 shows a real-time breakdown of your input latency split into 4 components. Each component points to a specific fix. GPU time high = lower video settings or enable Reflex. Flip queue high = run the Full Latency Stack tweak. CPU time high = core parking on, wrong power plan, or MMCSS not tuned. Input time high = raw input disabled or mouse driver overhead.',
     apply:`REM ── CS2 Latency Telemetry Overlay ──
REM Run these in CS2 console (~) or add to autoexec.cfg
REM
REM Enable the latency breakdown overlay:
cl_showtelemetry 1
REM
REM Enable detailed FPS + frame time counter:
cl_showfps 5
REM
REM ─────────────────────────────────────────────
REM HOW TO READ THE OVERLAY (target: 2-3ms total)
REM ─────────────────────────────────────────────
REM
REM INPUT (target: under 0.5ms)
REM   Time from mouse movement to frame processing start.
REM   High? Check: m_rawinput 1, no mouse acceleration,
REM         no USB polling issues, input method setting.
REM
REM CPU (target: under 1.5ms)
REM   Game thread frame time — physics, AI, rendering prep.
REM   High? Fix: Disable core parking tweak, Ultimate
REM         Performance power plan, CS2 Full Latency Stack.
REM         Also check: process priority (cs2-process tweak).
REM
REM GPU (target: under 1.5ms at 240Hz)
REM   Time GPU spends rendering the frame.
REM   High? Fix: Lower video settings, raise fps_max,
REM         enable NVIDIA Reflex (CS2 > Settings > Video).
REM         GPU-bound at 9ms usually means fps_max too low
REM         or Reflex not enabled.
REM
REM QUEUE (target: under 0.5ms)
REM   Flip queue and display pipeline delay.
REM   High? Fix: Run CS2 Full Latency Stack tweak which sets:
REM         HwFlipQueueLength=1 and DXGI MaxFrameLatency=1.
REM
REM ─────────────────────────────────────────────
REM NVIDIA REFLEX — single biggest win (2-5ms saved)
REM ─────────────────────────────────────────────
REM   CS2 > Settings > Video > NVIDIA Reflex
REM   Set to: Enabled + Boost
REM   NVIDIA GPU only. Requires you are NOT CPU-bound.
REM   Do NOT enable if CPU is your bottleneck (check overlay).
REM
REM ─────────────────────────────────────────────
REM QUICK CHECKLIST: 9ms → 2-3ms
REM ─────────────────────────────────────────────
REM   [ ] cl_showtelemetry 1 (identify your bottleneck first)
REM   [ ] CS2 Full Latency Stack tweak (flip queue + MMCSS)
REM   [ ] NVIDIA Reflex = Enabled + Boost (biggest GPU win)
REM   [ ] fps_max = monitor Hz + 20 (e.g. 260 for 240Hz)
REM   [ ] r_low_latency 2 (in autoexec.cfg)
REM   [ ] engine_low_latency_sleep_after_client_tick true
REM   [ ] Ultimate Performance power plan
REM   [ ] Disable core parking
REM   [ ] NIC interrupt moderation tweak
REM
echo.
echo Add cl_showtelemetry 1 to your autoexec.cfg then launch CS2
echo Read the overlay to find your bottleneck before applying fixes
pause`,
     revert:`REM In CS2 console to hide overlay:
cl_showtelemetry 0
cl_showfps 0`}

  valorant: [
    {id:'val-launch',icon:'🚀',name:'Valorant Launch Arguments (Vanguard-Safe)',style:'vc',badges:['val','fps','latency'],
     impact:`-dx11 cuts CPU overhead vs DX12 on most systems by 10-20%. Valorant's UE4 implementation has better driver maturity on DX11. -novsync disables engine-level VSync which can re-enable itself even when you turn it off in settings.`,
     desc:'Riot Client launch arguments verified safe with Vanguard anti-cheat. -dx11 forces DirectX 11 (lower CPU overhead on most systems vs DX12). -novsync disables VSync at the Unreal Engine level — not just in settings. -allowsoftwarekeyboard prevents input processing stalls on some systems.',
     apply:`REM Riot Client > Settings gear icon > Valorant > Launch Arguments:\nREM Paste exactly:\n-dx11 -novsync -allowsoftwarekeyboard\n\nREM EXPLANATION:\nREM -dx11           Forces DX11 (less CPU overhead vs DX12 on most GPUs)\nREM -novsync        Disables VSync at engine level\nREM -allowsoftwarekeyboard  Prevents input stalls\n\nREM REMOVED (outdated/harmful):\nREM -NoGrpce (never worked)\nREM -d3d11 (use -dx11 instead)`,
     revert:`REM Riot Client > Settings > Valorant > Launch Arguments > clear field`},
    {id:'val-video-settings',icon:'🎮',name:'Valorant In-Game Video Settings for Max FPS',style:'vc',badges:['val','fps','perf'],
     impact:`Multithreaded Rendering ON is the single biggest Valorant FPS gain — it can double FPS on 6+ core CPUs by using all cores for rendering instead of one. Cast Shadows OFF removes the most GPU-expensive effect. Together these two changes can add 80-150 FPS on mid-range hardware.`,
     desc:'Exact Valorant video settings for maximum FPS and minimum input lag. The most impactful settings are Multithreaded Rendering (ON) and Cast Shadows (OFF). Material Quality and Anisotropic Filtering have the next biggest GPU impact. All other settings have minor effects.',
     apply:`REM Valorant > Settings > Video tab:\n\nREM --- GENERAL ---\nREM Display Mode:          Fullscreen (NOT Windowed Fullscreen)\nREM Resolution:            Native OR 1280x960 stretched\nREM Frame Rate Limit:      Custom: [your Hz + 20]\nREM\nREM --- GRAPHICS (ordered by impact) ---\nREM Multithreaded Rendering: ON  ← biggest gain\nREM Cast Shadows:           Off  ← 2nd biggest GPU save\nREM Material Quality:       Low\nREM Texture Quality:        Low\nREM Detail Quality:         Low\nREM UI Quality:             Low\nREM Anti-Aliasing:          MSAA 2x (not 4x, not FXAA)\nREM Anisotropic Filtering:  1x\nREM VSync:                  Off\nREM Bloom:                  Off\nREM Distortion:             Off\nREM Improve Clarity:        Off\nREM Enhanced Gun Visuals:   Off\nREM Vignette:               Off`,
     revert:`REM Valorant > Settings > Video > Reset to Default`},
    {id:'val-engine',icon:'⚙️',name:'Valorant Engine.ini Performance Config',style:'vc',badges:['val','fps','perf'],
     impact:`r.ShadowQuality=0 and r.Shadow.CSM.MaxCascades=0 remove shadow cascades entirely — freeing 15-25% GPU that was drawing shadows you gain no gameplay information from. r.ViewDistanceScale=0.4 reduces how far away decorative objects render, cutting GPU draw calls with no competitive impact.`,
     desc:'Unreal Engine 4 Engine.ini overrides that cut shadow cascades, ambient occlusion, post-processing, and foliage rendering. Vanguard blocks external file modification tools but you can edit the file directly with Notepad. Always back up Engine.ini before editing — if Valorant detects a corrupted ini it will reset it.',
     apply:`REM BACKUP FIRST:\nREM Copy Engine.ini to your Desktop before editing\n\nREM File location:\nREM %LOCALAPPDATA%\\\\VALORANT\\\\Saved\\\\Config\\\\Windows\\\\Engine.ini\n\nREM Open with Notepad, add at end of file:\n[SystemSettings]\nr.Streaming.PoolSize=1024\nr.Shadow.RadiusThreshold=0.06\nr.SSR.MaxRoughness=0\nr.ShadowQuality=0\nr.Shadow.CSM.MaxCascades=0\nsg.FoliageQuality=0\nr.SceneColorFormat=2\nFX.BatchAsync=1\nFX.NiagaraAllowAsyncWorkSubmission=1\nr.SkeletalMeshLODBias=1\nr.ViewDistanceScale=0.4`,
     revert:`REM Delete the [SystemSettings] block from Engine.ini\nREM Or restore your Desktop backup`},
    {id:'val-priority',icon:'🛡️',name:'Vanguard-Safe Process Priority (Registry)',style:'vc',badges:['val','perf','latency'],
     impact:`Valorant gets CPU time before Discord, browsers, and every background process. The frame hitches that happen when a teammate pings the map or a Discord notification fires disappear because the CPU scheduler always returns to Valorant first.`,
     desc:'Sets Valorant to High CPU priority and High I/O priority via Image File Execution Options (IFEO) — a standard Windows registry path that Vanguard explicitly permits. No DLL injection, no driver-level changes. Applies automatically every launch without any script running.',
     apply:`reg add \"HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Image File Execution Options\\VALORANT-Win64-Shipping.exe\\PerfOptions\" /v CpuPriorityClass /t REG_DWORD /d 3 /f\nreg add \"HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Image File Execution Options\\VALORANT-Win64-Shipping.exe\\PerfOptions\" /v IoPriority /t REG_DWORD /d 3 /f\nREM Verify: Launch Valorant > Task Manager > Details > priority = High`,
     revert:`reg delete \"HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Image File Execution Options\\VALORANT-Win64-Shipping.exe\" /f`},
    {id:'val-network',icon:'📡',name:'Valorant Network — Reduce Packet Loss & Ping Spikes',style:'vc',badges:['val','net','ping','latency'],
     impact:`Valorant's tickrate is 128Hz but most ISP connections introduce micro-bursts of packet loss that cause rubberbanding and hit registration failures. This script optimizes the Windows network stack specifically for UDP gaming traffic, which Valorant uses for all positional data.`,
     desc:'Valorant uses UDP for game traffic with its own reliability layer on top. Windows default network settings are optimized for TCP throughput, not low-latency UDP. Nagle algorithm delays, receive window sizing, and interrupt coalescing all add latency that shows up as inconsistent hit registration even at low ping.',
     apply:`@echo off
REM Valorant Network Stack Optimization
REM Run as Administrator
REM
REM Disable Nagle on all NIC interfaces (no GUID needed):
powershell -Command "Get-ChildItem 'HKLM:\\SYSTEM\\CurrentControlSet\\Services\\Tcpip\\Parameters\\Interfaces' | ForEach-Object { Set-ItemProperty -Path $_.PSPath -Name 'TcpAckFrequency' -Value 1 -Type DWord -Force; Set-ItemProperty -Path $_.PSPath -Name 'TCPNoDelay' -Value 1 -Type DWord -Force } 2>$null"
reg add "HKLM\\SYSTEM\\CurrentControlSet\\Services\\Tcpip\\Parameters" /v TCPNoDelay /t REG_DWORD /d 1 /f
reg add "HKLM\\SYSTEM\\CurrentControlSet\\Services\\Tcpip\\Parameters" /v TcpAckFrequency /t REG_DWORD /d 1 /f
REM
REM Flush DNS
ipconfig /flushdns
REM
REM QoS policy for Valorant UDP:
netsh advfirewall firewall add rule name="OPTI-VAL-UDP" protocol=UDP dir=out localport=7000-8000 action=allow
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-VAL-NET" /v "Version" /t REG_SZ /d "1.0" /f
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-VAL-NET" /v "Application Name" /t REG_SZ /d "VALORANT-Win64-Shipping.exe" /f
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-VAL-NET" /v "Protocol" /t REG_SZ /d "UDP" /f
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-VAL-NET" /v "Local Port" /t REG_SZ /d "*" /f
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-VAL-NET" /v "Remote Port" /t REG_SZ /d "*" /f
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-VAL-NET" /v "Local IP" /t REG_SZ /d "*" /f
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-VAL-NET" /v "Remote IP" /t REG_SZ /d "*" /f
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-VAL-NET" /v "DSCP Value" /t REG_SZ /d "46" /f
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-VAL-NET" /v "Throttle Rate" /t REG_SZ /d "-1" /f
echo Valorant network optimization applied.
pause`,
     revert:`@echo off
reg delete "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-VAL-NET" /f 2>nul
netsh advfirewall firewall delete rule name="OPTI-VAL-UDP" 2>nul
powershell -Command "Get-ChildItem 'HKLM:\\SYSTEM\\CurrentControlSet\\Services\\Tcpip\\Parameters\\Interfaces' | ForEach-Object { Remove-ItemProperty -Path $_.PSPath -Name 'TcpAckFrequency' -Force -ErrorAction SilentlyContinue; Remove-ItemProperty -Path $_.PSPath -Name 'TCPNoDelay' -Force -ErrorAction SilentlyContinue }"
reg delete "HKLM\\SYSTEM\\CurrentControlSet\\Services\\Tcpip\\Parameters" /v TCPNoDelay /f 2>nul
reg delete "HKLM\\SYSTEM\\CurrentControlSet\\Services\\Tcpip\\Parameters" /v TcpAckFrequency /f 2>nul
echo Valorant network tweaks reverted.
pause`},
    {id:'val-fps-cap',icon:'🎯',name:'Valorant FPS Cap — Riot Recommended Method',style:'vc',badges:['val','fps','latency'],
     impact:`Riot officially recommends capping FPS in Valorant to reduce GPU load and CPU heat which can cause thermal throttling during long matches. A 480 FPS cap on a 240Hz monitor wastes GPU cycles on invisible frames that heat your card and reduce boost clocks over a 45-minute match.`,
     desc:'Valorant renders at whatever FPS it can achieve. On high-end hardware this can push 600-800 FPS, generating heat that triggers GPU throttling by map 4 of a match. Capping in-game at Hz+20 keeps the GPU at sustainable temperatures and prevents clock speed reductions that lower your fps in the rounds that matter most.',

     revert:`REM Valorant > Settings > Video > Frame Rate Limit > Uncapped`},
