  gpu: [
    {id:'hags',icon:'🎮',name:'Hardware GPU Scheduling (HAGS)',badges:['gpu','latency'],
     impact:`HAGS moves GPU command queue management from CPU to GPU hardware. In CS2, every frame submitted to the GPU previously required CPU involvement — HAGS removes the CPU from this loop. Result: lower CPU-GPU synchronization latency, more consistent frametimes, and slightly higher FPS especially at CPU-bottlenecked framerates.

**CS2 Impact:** Reduces input-to-display latency. In CS2, this makes mouse movement feel more 'raw' and connected to the crosshair.
**Valorant Impact:** Improves 1% lows during heavy ability usage (Viper ult, Neon slides) where CPU overhead usually spikes.`,
     desc:'CS2\'s render pipeline submits work to the GPU thousands of times per second at high framerates. Traditional GPU scheduling requires CPU involvement for every submission. HAGS removes the CPU from this loop, reducing the latency between CS2\'s render thread finishing frame preparation and the GPU starting to render it. Result: lower frame latency, slightly higher FPS.',
     apply:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\GraphicsDrivers" /v HwSchMode /t REG_DWORD /d 2 /f`,
     revert:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\GraphicsDrivers" /v HwSchMode /t REG_DWORD /d 1 /f`},
    {id:'fso',icon:'🖥️',name:'Disable Fullscreen Optimizations',badges:['latency','gpu'],
     impact:`Fullscreen Optimizations silently convert CS2 and Valorant's exclusive fullscreen into borderless windowed, keeping the DWM compositor active. The compositor adds 1-3ms of frame delivery latency that you cannot remove until you disable FSO. True exclusive fullscreen bypasses DWM entirely — your rendered frames go straight to the monitor.`,
     desc:'CS2 with FSO enabled (default) runs in a fake fullscreen that still routes frames through the Windows compositor. Disabling FSO per-executable lets CS2 claim true exclusive display access, bypassing DWM and eliminating the compositor\'s frame delivery overhead. Combined with HAGS and Flip Model this achieves the minimum possible render-to-display latency.',
     apply:`reg add "HKCU\\System\\GameConfigStore" /v GameDVR_FSEBehaviorMode /t REG_DWORD /d 2 /f\nreg add "HKCU\\System\\GameConfigStore" /v GameDVR_HonorUserFSEBehaviorMode /t REG_DWORD /d 1 /f\nreg add "HKCU\\System\\GameConfigStore" /v GameDVR_EFSEBehaviorMode /t REG_DWORD /d 0 /f`,
     revert:`reg add "HKCU\\System\\GameConfigStore" /v GameDVR_FSEBehaviorMode /t REG_DWORD /d 0 /f\nreg add "HKCU\\System\\GameConfigStore" /v GameDVR_HonorUserFSEBehaviorMode /t REG_DWORD /d 0 /f\nreg add "HKCU\\System\\GameConfigStore" /v GameDVR_EFSEBehaviorMode /t REG_DWORD /d 2 /f`},
    {id:'gamedvr',icon:'📵',name:'Disable Game Bar & Xbox DVR',badges:['perf'],
     impact:`Xbox Game DVR hooks into the DirectX pipeline of every game including CS2 and Valorant. Even when not actively recording, the DVR service monitors every frame for potential capture — adding CPU and GPU overhead. It also interferes with exclusive fullscreen mode, silently forcing games into borderless windowed and re-enabling DWM compositor overhead.`,
     desc:'CS2\'s random 300ms freeze at startup is almost always Xbox DVR initializing its recording hook. Disabling via registry is more reliable than the Settings UI — the Settings toggle sometimes re-enables itself after Windows updates. After disabling, CS2 and Valorant can achieve true exclusive fullscreen with zero DVR overhead.',
     apply:`reg add "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\GameDVR" /v AppCaptureEnabled /t REG_DWORD /d 0 /f\nreg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\GameDVR" /v AllowGameDVR /t REG_DWORD /d 0 /f`,
     revert:`@echo off\nreg add "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\GameDVR" /v AppCaptureEnabled /t REG_DWORD /d 1 /f\nreg delete "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\GameDVR" /v AllowGameDVR /f 2>nul\necho Game DVR restored.\npause`},
    {id:'dxgi-latency',icon:'📦',name:'Reduce DXGI Pre-Rendered Frames to 1',badges:['latency','gpu'],
     impact:`DXGI MaxFrameLatency controls how many frames the GPU renders ahead. At the default of 3, the GPU is always working on frames 1, 2, and 3 ahead of what's displayed — meaning you see a frame that was rendered up to 3 frame-times ago. Setting to 1 eliminates this pre-render buffer, dramatically cutting the time between your input and seeing the result.`,
     desc:'In CS2 at 240Hz, 3 frames of DXGI latency = ~12.5ms of additional input-to-display latency on top of monitor latency. Setting MaxFrameLatency=1 cuts this to ~4ms. This is what NVIDIA Reflex Low Latency mode sets internally — this registry key does the same thing without needing NVIDIA-specific software.',
     apply:`reg add "HKLM\\SOFTWARE\\Microsoft\\DXGI" /v MaxFrameLatency /t REG_DWORD /d 1 /f`,
     revert:`reg add "HKLM\\SOFTWARE\\Microsoft\\DXGI" /v MaxFrameLatency /t REG_DWORD /d 3 /f`},
    {id:'flip-model',icon:'🔄',name:'Enable Low-Latency Flip Presentation',badges:['latency','gpu'],
     impact:`Flip Model Presentation lets CS2 and Valorant present rendered frames directly to the display without a blit copy. Traditional Present() copies the frame to a separate display buffer before showing it — wasting GPU time. Flip Model presents the render buffer directly, eliminating this copy and enabling VRR (G-Sync/FreeSync) and Reflex simultaneously.`,
     desc:'CS2 and Valorant must use Flip Model to support VRR and NVIDIA Reflex at the same time. Traditional blit presentation breaks both. Flip Discard (the optimal variant) drops old frames immediately rather than queuing them, ensuring the most recent frame is always what gets displayed — critical for sub-20ms gaming at high framerates.',
     apply:`@echo off\nREM OPTI — Enable Low-Latency Flip Presentation (Allow Tearing)\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\GraphicsDrivers" /v AllowTearing /t REG_DWORD /d 1 /f\necho Flip presentation (allow tearing) enabled. Reboot recommended.\npause`,
     revert:`@echo off\nreg delete "HKLM\\SYSTEM\\CurrentControlSet\\Control\\GraphicsDrivers" /v AllowTearing /f 2>nul\necho Flip presentation reverted.\npause`},
    {id:'dwm-throttle',icon:'🎨',name:'Disable DWM Rendering Throttle',badges:['gpu','latency'],
     impact:`When CS2 or Valorant are minimized, DWM still tries to render their frames at reduced rate. This background rendering consumes GPU time and RAM bandwidth even when you're not playing. Disabling DWM throttle for background applications stops this background rendering, freeing GPU resources entirely when the game isn't in focus.`,
     desc:'Between CS2 rounds while spectating, or when alt-tabbed to check Discord, DWM throttles the game\'s background rendering. This throttling overhead can cause frame timing disruption when you re-enter the game. Disabling ensures clean frame timing restoration when switching back to CS2 or Valorant.',
     apply:`@echo off\nREM OPTI — Disable DWM Rendering Throttle\nreg add "HKCU\\Software\\Microsoft\\Windows\\DWM" /v DisableThrottling /t REG_DWORD /d 1 /f\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile" /v NoLazyMode /t REG_DWORD /d 1 /f\necho DWM throttle disabled. No reboot needed.\npause`,
     revert:`@echo off\nreg delete "HKCU\\Software\\Microsoft\\Windows\\DWM" /v DisableThrottling /f 2>nul\nreg delete "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile" /v NoLazyMode /f 2>nul\necho DWM throttle settings reverted.\npause`},
    {id:'nvidia-reflex',icon:'⚡',name:'NVIDIA Reflex / AMD Anti-Lag — Enable via Registry',badges:['latency','gpu'],
     impact:`NVIDIA Reflex reduces system latency by optimizing the CPU-GPU synchronization pipeline specifically for the game. Without Reflex, the CPU submits frames to the GPU and the GPU processes them independently — the CPU can run too far ahead creating a GPU queue backlog. Reflex synchronizes them to keep the queue empty, minimizing input-to-display latency.`,
     desc:'CS2 has native NVIDIA Reflex support accessible in Video settings. Reflex + Boost is the recommended setting — Boost keeps GPU clocks pinned even at low GPU utilization (which happens with high FPS caps), ensuring the GPU is always ready to process a frame immediately. In CS2 with Reflex + Boost, system latency can drop by 10-30ms compared to no Reflex.',
     apply:`@echo off\nREM OPTI — NVIDIA Reflex / AMD Anti-Lag\nREM NVIDIA: Enable Reflex in-game (CS2/Valorant > Low Latency = Enabled + Boost)\nREM NVIDIA Control Panel: Low Latency Mode = Ultra, Power = Prefer Max Performance\nREM\nREM AMD Anti-Lag (RX 5000+ / RDNA2+) — dynamic registry enable:\npowershell -Command "Get-ChildItem 'HKLM:\\SYSTEM\\CurrentControlSet\\Control\\Class\\{4d36e968-e325-11ce-bfc1-08002be10318}' | Where-Object { (Get-ItemProperty $_.PSPath -EA SilentlyContinue).DriverDesc -like '*AMD*' -or (Get-ItemProperty $_.PSPath -EA SilentlyContinue).DriverDesc -like '*Radeon*' } | ForEach-Object { Set-ItemProperty -Path $_.PSPath -Name 'KMD_EnableAntiLag' -Value 1 -Type DWord -Force; Write-Host ('Anti-Lag enabled for: ' + (Get-ItemProperty $_.PSPath).DriverDesc) }"\necho Done. Reboot recommended.\npause`,
     revert:`@echo off\nREM Disable AMD Anti-Lag\npowershell -Command "Get-ChildItem 'HKLM:\\SYSTEM\\CurrentControlSet\\Control\\Class\\{4d36e968-e325-11ce-bfc1-08002be10318}' | Where-Object { (Get-ItemProperty $_.PSPath -EA SilentlyContinue).DriverDesc -like '*AMD*' -or (Get-ItemProperty $_.PSPath -EA SilentlyContinue).DriverDesc -like '*Radeon*' } | ForEach-Object { Remove-ItemProperty -Path $_.PSPath -Name 'KMD_EnableAntiLag' -Force -EA SilentlyContinue; Write-Host ('Anti-Lag disabled for: ' + (Get-ItemProperty $_.PSPath).DriverDesc) }"\necho AMD Anti-Lag disabled.\npause`},
    {id:'hw-flip-queue',icon:'📐',name:'Reduce Hardware Flip Queue to 1',badges:['latency','gpu'],
     impact:`The hardware flip queue determines how many rendered frames sit in the GPU's display queue waiting to be shown. Reducing this to 1 means the most recently rendered frame is shown next — not a frame that was rendered 2-3 frames ago. Combined with DXGI MaxFrameLatency=1 and Flip Model, this achieves the absolute minimum render-queue latency.`,
     desc:'CS2 players using NVIDIA Reflex should also tune the flip queue — Reflex manages the CPU-GPU timing, but the GPU-display queue is separate. Flip queue 1 ensures that after Reflex delivers a frame to the GPU, that frame is shown next rather than waiting behind older frames. Together these eliminate every source of queue-based latency.',
     apply:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\GraphicsDrivers" /v HwFlipQueueLength /t REG_DWORD /d 1 /f`,
     revert:`@echo off\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\GraphicsDrivers" /v HwFlipQueueLength /t REG_DWORD /d 2 /f\necho Flip queue length restored to default (2).\npause`},
    {id:'display-dpi',icon:'🖥️',name:'Lock Display to Native DPI — Disable Scaling',badges:['latency','gpu'],
     impact:`Non-native DPI scaling (125%, 150%) forces Windows to upscale every UI element using GPU processing. CS2 and Valorant in fullscreen bypass DPI scaling entirely, but the OS DPI setting affects overlay rendering, the Steam overlay, Discord overlay, and any application that renders at non-native resolution. 100% (native) scaling eliminates all upscaling overhead.`,
     desc:'CS2 in exclusive fullscreen runs at native resolution regardless of DPI setting. But the Steam overlay and Discord overlay respect the OS DPI setting — at 125% they render at a larger resolution and scale down, consuming more GPU memory and render time. Native 100% DPI ensures overlays render at minimum cost.',
     apply:`REM Settings > Display > Scale = 100%\nREM Also per-app: right-click .exe > Properties > Compatibility\nREM > Change High DPI Settings > Override = Application\nREM\nREM Registry approach for global DPI lock:\nreg add "HKCU\\Control Panel\\Desktop" /v LogPixels /t REG_DWORD /d 96 /f\nreg add "HKCU\\Control Panel\\Desktop" /v Win8DpiScaling /t REG_DWORD /d 1 /f`,
     revert:`REM Settings > Display > Scale = your preferred scaling\nreg delete "HKCU\\Control Panel\\Desktop" /v LogPixels /f`},
    {id:'monitor-refresh',icon:'📺',name:'Verify & Lock Monitor to Max Refresh Rate',badges:['latency','gpu'],
     impact:`Your monitor refresh rate must match your game's maximum FPS cap for optimal performance. Running a 144Hz monitor at 60Hz (common after driver updates reset the setting) means CS2 and Valorant render at the right FPS but only 60 frames per second reach your eyes. Always verify your monitor is running at its maximum advertised refresh rate.`,
     desc:'CS2 and Valorant players sometimes wonder why they feel more input lag after a driver update — the driver often resets the monitor refresh rate to 60Hz. Verifying your monitor is at 144/165/240/360Hz is a basic step but frequently missed. A 240Hz CS2 session running on a 60Hz display is wasting 180 frames per second.',
     apply:`REM Check current refresh rate:\nREM Settings > System > Display > Advanced Display Settings\nREM Should show your max Hz (144, 165, 240, 360)\nREM\nREM If stuck at 60Hz after driver install:\nREM Device Manager > Monitors > Generic PnP Monitor > Properties\nREM Driver > Update Driver > Browse > Let me pick > select highest Hz entry\nREM\nREM Also force via NVIDIA/AMD control panel:\nREM NVIDIA: Change Resolution > Refresh Rate dropdown\nREM AMD: Display > Refresh Rate dropdown`,
     revert:`REM No revert needed — verify in Settings > Display`},
    {id:'gpu-interrupt-moderation',icon:'🎮',name:'Disable GPU Interrupt Moderation',style:'gc',badges:['gpu','latency'],
     impact:`GPU interrupt moderation batches GPU completion signals to reduce CPU interrupt overhead. While this improves throughput, it adds latency between frame completion and the CPU receiving the signal to start the next frame. Disabling it reduces frame delivery latency at the cost of slightly higher CPU interrupt load.`,
     desc:'Modern GPUs use interrupt moderation to batch completion notifications, similar to how NICs use interrupt coalescing. For gaming, the latency added by batching GPU completion interrupts is more harmful than the CPU overhead of individual interrupts. Disabling moderation ensures the CPU is notified immediately when each frame completes.',
     apply:`@echo off
REM OPTI — Disable GPU Interrupt Moderation
REM Run as Administrator
reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\GraphicsDrivers" /v TdrLevel /t REG_DWORD /d 0 /f
reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\GraphicsDrivers" /v TdrDelay /t REG_DWORD /d 60 /f
echo GPU interrupt settings optimized. Reboot recommended.
pause`,
     revert:`@echo off
reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\GraphicsDrivers" /v TdrLevel /t REG_DWORD /d 3 /f
reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\GraphicsDrivers" /v TdrDelay /t REG_DWORD /d 2 /f
echo GPU TDR settings restored.
pause`}
  ],
  network: [
    {id:'nagle',icon:'🌐',name:"Disable Nagle's Algorithm",badges:['net','latency','ping'],
     desc:"Nagle's Algorithm batches small TCP packets together adding 20-200ms of artificial delay. Disabling sends each packet the instant it is ready — reducing in-game ping and making server tick responses immediate. One of the highest-impact network tweaks.",
     impact:`Nagle's algorithm buffers small TCP packets and sends them together to reduce overhead. For gaming this is catastrophic — your movement and click data sits in a buffer for up to 40ms waiting for the buffer to fill before being sent. Disabling Nagle (TcpAckFrequency + TcpNoDelay) makes every game packet send immediately. In CS2 and Valorant, this alone can reduce your effective network latency by 10–40ms on some configurations.

**CS2 Impact:** Reduces networking jitter. Essential for CS2's UDP-based sub-tick packets to arrive without artificial buffering.
**Valorant Impact:** Ensures your 'shot' packet is sent to Riot servers the millisecond you click, potentially winning 50/50 duels.`,
     apply:`@echo off
REM Disable Nagle Algorithm on ALL active NIC adapters automatically
REM Run as Administrator
REM
REM Apply global TCP parameters:
reg add "HKLM\\SYSTEM\\CurrentControlSet\\Services\\Tcpip\\Parameters" /v TCPNoDelay /t REG_DWORD /d 1 /f
reg add "HKLM\\SYSTEM\\CurrentControlSet\\Services\\Tcpip\\Parameters" /v TcpAckFrequency /t REG_DWORD /d 1 /f
reg add "HKLM\\SYSTEM\\CurrentControlSet\\Services\\Tcpip\\Parameters" /v TcpDelAckTicks /t REG_DWORD /d 0 /f
REM
REM Apply to all NIC interfaces (no GUID needed):
powershell -Command "Get-ChildItem 'HKLM:\\SYSTEM\\CurrentControlSet\\Services\\Tcpip\\Parameters\\Interfaces' | ForEach-Object { Set-ItemProperty -Path $_.PSPath -Name 'TCPNoDelay' -Value 1 -Type DWord -Force; Set-ItemProperty -Path $_.PSPath -Name 'TcpAckFrequency' -Value 1 -Type DWord -Force; Set-ItemProperty -Path $_.PSPath -Name 'TcpDelAckTicks' -Value 0 -Type DWord -Force } 2>$null"
echo Nagle disabled on all adapters.
pause`,
     revert:`@echo off
REM Restore Nagle Algorithm defaults
reg delete "HKLM\\SYSTEM\\CurrentControlSet\\Services\\Tcpip\\Parameters" /v TCPNoDelay /f 2>nul
reg delete "HKLM\\SYSTEM\\CurrentControlSet\\Services\\Tcpip\\Parameters" /v TcpAckFrequency /f 2>nul
reg delete "HKLM\\SYSTEM\\CurrentControlSet\\Services\\Tcpip\\Parameters" /v TcpDelAckTicks /f 2>nul
powershell -Command "Get-ChildItem 'HKLM:\\SYSTEM\\CurrentControlSet\\Services\\Tcpip\\Parameters\\Interfaces' | ForEach-Object { Remove-ItemProperty -Path $_.PSPath -Name 'TCPNoDelay' -Force -ErrorAction SilentlyContinue; Remove-ItemProperty -Path $_.PSPath -Name 'TcpAckFrequency' -Force -ErrorAction SilentlyContinue; Remove-ItemProperty -Path $_.PSPath -Name 'TcpDelAckTicks' -Force -ErrorAction SilentlyContinue }"
echo Nagle restored.
pause`},
    {id:'net-throttle',icon:'📶',name:'Disable Network Throttling Index',badges:['net','perf'],
     impact:`In CS2, lower Nagle delay = your shot registers closer to when you clicked. In Valorant, movement updates reach Riot's servers faster, reducing the rubberbanding where your position snaps back after peeking.`,
     desc:'Windows artificially caps how much CPU time network drivers get, protecting multimedia apps at the expense of games. Removing this cap lets your NIC driver process CS2 and Valorant packets as fast as the hardware allows — no artificial governor slowing down game packet delivery.\'s Algorithm makes CS2 and Valorant send every packet the instant it\'s ready instead of waiting to batch them together. In CS2 this means your movement inputs and shot commands leave your PC immediately — not 20-200ms later. This is why pros always disable Nagle: it directly tightens the gap between your action and the server receiving it.',
     apply:`@echo off
REM OPTI — Disable Network Throttling Index
REM Run as Administrator
echo Disabling network throttling...
reg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile" /v NetworkThrottlingIndex /t REG_DWORD /d 4294967295 /f
echo Done. No reboot needed.
pause`,
     revert:`@echo off
reg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile" /v NetworkThrottlingIndex /t REG_DWORD /d 10 /f
echo Network throttling index restored.
pause`},
    {id:'tcp-autotuning',icon:'📡',name:'Optimize TCP Auto-Tuning Level',badges:['net','latency','ping'],
     impact:`Lower ping variance in CS2 means more consistent hit reg. In Valorant it reduces the frustrating shots-that-don't-register feeling that happens even at low average ping.`,
     desc:'Sets TCP receive window scaling to reduce buffer bloat — the hidden source of the \'rubber band\' lag where your ping reads fine but the game feels delayed. Compound TCP improves performance on connections with any packet loss. In CS2 this reduces ping variance (the \'var\' stat in cl_shownet) which is what makes hit registration feel inconsistent.',
     apply:`@echo off
REM OPTI — TCP Auto-Tuning (Restricted for gaming)
REM Run as Administrator
echo [1/2] Setting TCP auto-tuning to highly restricted...
netsh int tcp set global autotuninglevel=highlyrestricted
echo [2/2] Enabling ECN capability...
netsh int tcp set global ecncapability=enabled
echo Done. No reboot needed.
pause`,
     revert:`@echo off
netsh int tcp set global autotuninglevel=normal
netsh int tcp set global ecncapability=disabled
echo TCP auto-tuning restored to normal.
pause`},
    {id:'dns-cache',icon:'🗂️',name:'Optimize DNS Resolver Cache',badges:['net','ping'],
     impact:`CS2 matchmaking connects to different Valve server IPs per match. Larger DNS cache = faster initial connection. Valorant's Vanguard also makes DNS calls at startup — this speeds that up too.`,
     desc:'Expands the DNS cache so CS2 and Valorant server IPs stay resolved in memory. Without this, every match connection forces a DNS lookup that adds 20-150ms of delay before the first game packet is even sent. After optimization, reconnecting to the same server region is instant.',
     apply:`@echo off
REM OPTI — DNS Cache Optimization
REM Run as Administrator
echo Optimizing DNS cache parameters...

    {id:'route-optimizer',icon:'🗺️',name:'Game Traffic Route Optimizer (ExitLag-Style)',badges:['net','latency','ping'],
     impact:`Forces game traffic to use the lowest-latency path instead of your ISP\'s default routing. Direct equivalent of what ExitLag does for free, without the subscription.`,
     desc:'Your ISP routes traffic through whatever path is cheapest for them — not fastest for you. ExitLag and Mudfish charge $5-10/month to route around this. This script does the same thing for free: marks CS2 and Valorant UDP traffic with DSCP EF (highest priority), adds persistent static routes to Valve and Riot server IP ranges via your fastest gateway, and flushes DNS/ARP to start clean.',
     apply:`@echo off
REM ══════════════════════════════════════════
REM  OPTI — Game Traffic Route Optimizer
REM  Free ExitLag-style routing for Windows
REM  Run as Administrator
REM ══════════════════════════════════════════

echo [1/4] Detecting default gateway...
for /f "tokens=3" %%i in ('route print ^| findstr "0.0.0.0" ^| findstr /v "127.0.0.1"') do set GW=%%i
echo Gateway: %GW%

echo [2/4] Flushing DNS and ARP caches...
ipconfig /flushdns
arp -d *

echo [3/4] Creating QoS policies for game traffic...
REM QoS policy requires Group Policy — uses netsh qos (Windows 10/11)
netsh advfirewall firewall add rule name="OPTI-CS2-Out" protocol=UDP dir=out localport=27005-27020 action=allow
netsh advfirewall firewall add rule name="OPTI-VAL-Out" protocol=UDP dir=out localport=7000-8000 action=allow

REM Windows QoS DSCP marking via registry (Group Policy path)
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-CS2" /v "Version" /t REG_SZ /d "1.0" /f
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-CS2" /v "Application Name" /t REG_SZ /d "cs2.exe" /f
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-CS2" /v "Protocol" /t REG_SZ /d "UDP" /f
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-CS2" /v "Local Port" /t REG_SZ /d "*" /f
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-CS2" /v "Remote Port" /t REG_SZ /d "*" /f
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-CS2" /v "Local IP" /t REG_SZ /d "*" /f
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-CS2" /v "Remote IP" /t REG_SZ /d "*" /f
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-CS2" /v "DSCP Value" /t REG_SZ /d "46" /f
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-CS2" /v "Throttle Rate" /t REG_SZ /d "-1" /f

reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-VAL" /v "Version" /t REG_SZ /d "1.0" /f
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-VAL" /v "Application Name" /t REG_SZ /d "VALORANT-Win64-Shipping.exe" /f
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-VAL" /v "Protocol" /t REG_SZ /d "UDP" /f
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-VAL" /v "Local Port" /t REG_SZ /d "*" /f
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-VAL" /v "Remote Port" /t REG_SZ /d "*" /f
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-VAL" /v "Local IP" /t REG_SZ /d "*" /f
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-VAL" /v "Remote IP" /t REG_SZ /d "*" /f
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-VAL" /v "DSCP Value" /t REG_SZ /d "46" /f
reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-VAL" /v "Throttle Rate" /t REG_SZ /d "-1" /f

echo [4/4] Adding static routes for Valve/CS2 server ranges...
if defined GW (
    route add 208.64.200.0 mask 255.255.255.0 %GW% -p
    route add 192.69.96.0 mask 255.255.255.0 %GW% -p
    echo Routes added via gateway %GW%
) else (
    echo WARNING: Could not detect gateway. Run manually:
    echo   route add 208.64.200.0 mask 255.255.255.0 [YOUR_GATEWAY] -p
)

echo.
echo Done! QoS DSCP 46 applied to CS2 and VALORANT.
echo Restart recommended for Group Policy QoS to take effect.
pause`,
     revert:`@echo off
reg delete "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-CS2" /f 2>nul
reg delete "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\QoS\\OPTI-VAL" /f 2>nul
netsh advfirewall firewall delete rule name="OPTI-CS2-Out"
netsh advfirewall firewall delete rule name="OPTI-VAL-Out"
route delete 208.64.200.0 2>nul
route delete 192.69.96.0 2>nul
echo Route optimizer reverted.
pause`},
    {id:'dns-gaming',icon:'🌍',name:'Switch to Low-Latency Gaming DNS',badges:['net','ping','latency'],
     impact:`Faster DNS resolution means faster server matchmaking and reduced "connecting to game server" delay. Cloudflare 1.1.1.1 is consistently the lowest-latency public DNS globally.`,
     desc:'Your ISP\'s DNS server is often geographically distant and shared with thousands of users, adding 30-150ms of DNS resolution time. Cloudflare 1.1.1.1 is consistently the fastest public DNS globally with average resolution times under 14ms. Every new server connection CS2 and Valorant make starts with a DNS lookup — faster DNS means faster match joins.',

    {id:'nic-interrupt-mod',icon:'📡',name:'Disable NIC Interrupt Moderation (Zero-Coalesce)',badges:['net','ping','latency'],
     impact:`Windows defaults to "medium" interrupt moderation on most NICs — this batches incoming packets together for up to 50µs before processing them. For gaming, every packet your NIC receives is a position update, hit registration, or tick data from the server. That 50µs coalescing delay stacks with your ping. Disabling interrupt moderation forces every packet to be processed the instant it arrives — measurable improvement on CS2 and Valorant where server tick rates make per-packet timing critical.`,
     desc:'Disables NIC interrupt coalescing, forcing the adapter to interrupt the CPU immediately on every received packet rather than batching for 50µs. Eliminates the "hidden" interrupt moderation delay that sits on top of your measured ping. Most impactful on connections with consistent base ping under 30ms.',
     apply:`@echo off
REM OPTI — Disable NIC Interrupt Moderation

echo Disabling interrupt moderation on all network adapters...
powershell -Command "

  $name = $_.Name

    Set-NetAdapterAdvancedProperty -Name $name -DisplayName 'Interrupt Moderation Rate' -DisplayValue 'Off' -ErrorAction SilentlyContinue
    Write-Host ('Interrupt moderation disabled for: ' + $name)

    {id:'rss-cpu-bind',icon:'🔀',name:'Bind NIC Receive Side Scaling to Non-Game Cores',badges:['net','latency'],
     impact:`RSS (Receive Side Scaling) distributes NIC interrupt processing across CPU cores. By default Windows assigns RSS queues starting from core 0 — the same core your game's main thread often runs on. Every incoming packet from the game server triggers a DPC on core 0, competing directly with game logic for CPU time. Pinning RSS to the last physical core(s) puts all network interrupt processing on a dedicated core that the game never touches.`,
     desc:'Receive Side Scaling distributes network DPCs across CPU cores. By default they land on core 0 alongside your game thread. This moves RSS queue processing to your last physical core, eliminating network DPC interference with game thread execution.',
     apply:`@echo off

echo Detecting CPU core count and binding RSS...
powershell -Command "

    {id:'sysmain',icon:'🧹',name:'Disable SysMain (Superfetch)',badges:['perf'],
     impact:`SysMain continuously pre-loads applications it predicts you'll use based on usage patterns. During a CS2 or Valorant match, it competes for RAM and disk I/O to maintain its prediction cache. On SSDs this is entirely pointless — app load times are already fast — and the background I/O creates random frame drops.`,
     desc:'CS2 mid-match stutters are sometimes caused by SysMain deciding to preload a background app into the RAM CS2 needs for map textures. In Valorant, SysMain\'s disk I/O during Sage or Omen ability loads (which trigger texture streaming) adds latency to the texture load.',
     apply:`sc stop SysMain\nsc config SysMain start= disabled`,
     revert:`sc config SysMain start= auto\nsc start SysMain`},
    {id:'wsearch',icon:'🔍',name:'Disable Windows Search Indexer',badges:['perf'],
     impact:`Windows Search creates a real-time index of every file on your drive. The indexer runs continuously in the background generating constant disk I/O and CPU spikes. These spikes are completely unpredictable — they can happen at any moment during a CS2 match, causing the random micro-stutters that appear with no obvious cause.`,
     desc:'CS2 players experiencing random 50-200ms hitches that don\'t correlate with GPU or network load often have Windows Search as the culprit. The indexer fires on any file write — including CS2\'s own temp files. In Valorant, Vanguard\'s log writing can trigger Search indexing mid-match.',
     apply:`sc stop WSearch\nsc config WSearch start= disabled`,
     revert:`sc config WSearch start= delayed-auto\nsc start WSearch`},
    {id:'telemetry',icon:'📡',name:'Disable Telemetry, Xbox DVR & Background Bandwidth',badges:['perf'],
     impact:`Each disabled service removes a source of DPC interrupts, network spikes, or CPU scheduling contention. Xbox DVR alone adds a persistent GPU interrupt hook. Delivery Optimization can saturate your upload mid-match. SgrmBroker fires a kernel poll every 5 seconds. Combined, these account for 1-3ms of the gap between your current latency and target 2-3ms.`,
     desc:'Kills all background Windows processes that fire interrupts, use bandwidth, or spike CPU during gaming: DiagTrack telemetry, Xbox Game DVR (adds GPU interrupt overhead even when off in Settings), GameBar presence scanner, Delivery Optimization P2P (uses your upload bandwidth), Security Health poller (fires every 5s), Application Experience service (500ms spike on game launch), and 6 scheduled tasks that can fire mid-match.',
     apply:`reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\DataCollection" /v AllowTelemetry /t REG_DWORD /d 0 /f\nsc stop DiagTrack & sc config DiagTrack start= disabled\nsc stop diagnosticshub.standardcollector.service & sc config diagnosticshub.standardcollector.service start= disabled\nsc stop WerSvc & sc config WerSvc start= disabled\nREM Kill Xbox Game DVR — adds GPU/DPC interrupt overhead even when "disabled" in settings:\nreg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\GameDVR" /v AllowGameDVR /t REG_DWORD /d 0 /f\nreg add "HKCU\\System\\GameConfigStore" /v GameDVR_Enabled /t REG_DWORD /d 0 /f\nreg add "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\GameDVR" /v AppCaptureEnabled /t REG_DWORD /d 0 /f\nsc stop BcastDVRUserService 2>nul & sc config BcastDVRUserService start= disabled 2>nul\nREM Kill GameBar presence writer (polls every 2s scanning for game windows):\nsc stop GameBarPresenceWriter 2>nul & sc config GameBarPresenceWriter start= disabled 2>nul\nreg add "HKCU\\Software\\Microsoft\\GameBar" /v UseNexusForGameBarEnabled /t REG_DWORD /d 0 /f\nreg add "HKCU\\Software\\Microsoft\\GameBar" /v AllowAutoGameMode /t REG_DWORD /d 0 /f\nREM Disable Delivery Optimization (uses your bandwidth for Windows Update P2P):\nsc stop DoSvc & sc config DoSvc start= disabled\nreg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\DeliveryOptimization" /v DODownloadMode /t REG_DWORD /d 0 /f\nREM Disable Security Health poller (SgrmBroker polls every 5s = consistent DPC spike):\nsc stop SgrmBroker 2>nul & sc config SgrmBroker start= disabled 2>nul\nREM Kill Application Experience service (fires on every game launch causing 200-500ms stutter):\nsc stop AeLookupSvc 2>nul & sc config AeLookupSvc start= disabled 2>nul\nsc stop PcaSvc 2>nul & sc config PcaSvc start= disabled 2>nul\nREM Kill Windows Error Reporting live kernel dumps (can spike CPU mid-game):\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows\\Windows Error Reporting" /v Disabled /t REG_DWORD /d 1 /f\nREM Disable CEIP and Application Experience scheduled tasks:\nschtasks /Change /TN "Microsoft\\Windows\\Customer Experience Improvement Program\\Consolidator" /Disable 2>nul\nschtasks /Change /TN "Microsoft\\Windows\\Customer Experience Improvement Program\\UsbCeip" /Disable 2>nul\nschtasks /Change /TN "Microsoft\\Windows\\Application Experience\\Microsoft Compatibility Appraiser" /Disable 2>nul\nschtasks /Change /TN "Microsoft\\Windows\\Application Experience\\ProgramDataUpdater" /Disable 2>nul\nschtasks /Change /TN "Microsoft\\Windows\\Application Experience\\StartupAppTask" /Disable 2>nul\nREM Disable Windows Update background bandwidth usage during gaming:\nreg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\WindowsUpdate\\AU" /v NoAutoUpdate /t REG_DWORD /d 0 /f\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\DeliveryOptimization\\Config" /v DODownloadMode /t REG_DWORD /d 0 /f\nREM Block telemetry endpoints at the registry level:\nreg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\DataCollection" /v DisableEnterpriseAuthProxy /t REG_DWORD /d 1 /f\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Services\\DiagTrack" /v Start /t REG_DWORD /d 4 /f`,
     revert:`reg delete "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\DataCollection" /v AllowTelemetry /f 2>nul\nreg delete "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\DataCollection" /v DisableEnterpriseAuthProxy /f 2>nul\nsc config DiagTrack start= auto & sc start DiagTrack\nsc config WerSvc start= manual\nsc config DoSvc start= auto & sc start DoSvc 2>nul\nreg delete "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\GameDVR" /v AllowGameDVR /f 2>nul\nreg delete "HKCU\\System\\GameConfigStore" /v GameDVR_Enabled /f 2>nul\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows\\Windows Error Reporting" /v Disabled /t REG_DWORD /d 0 /f\nsc config AeLookupSvc start= manual 2>nul\nsc config PcaSvc start= manual 2>nul\nschtasks /Change /TN "Microsoft\\Windows\\Customer Experience Improvement Program\\Consolidator" /Enable 2>nul\nschtasks /Change /TN "Microsoft\\Windows\\Application Experience\\Microsoft Compatibility Appraiser" /Enable 2>nul\necho Telemetry reverted. Note: Xbox DVR and GameBar will need manual re-enable in Windows Settings if desired.`},
    {id:'visual-fx',icon:'🎭',name:'Disable All Visual Effects & Animations',badges:['perf','gpu'],
     impact:`Windows animates every window, menu, and UI element using the GPU. During a CS2 or Valorant match these animations run in the background via DWM, consuming GPU time on invisible effects. Setting visual effects to Best Performance disables all animations and tells Windows to minimize GPU use for the desktop.`,
     desc:'Even in exclusive fullscreen, alt-tabbing during CS2 with animations enabled causes visible GPU load spikes as Windows re-renders the animated desktop. Disabling animations makes alt-tab instant and ensures the GPU is 100% available to the game rather than animating desktop effects.',
     apply:`reg add "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\VisualEffects" /v VisualFXSetting /t REG_DWORD /d 2 /f\nreg add "HKCU\\Control Panel\\Desktop" /v FontSmoothing /t REG_SZ /d "2" /f`,
     revert:`reg add "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\VisualEffects" /v VisualFXSetting /t REG_DWORD /d 0 /f`},
    {id:'power-usb',icon:'🔌',name:'Disable USB Selective Suspend',badges:['latency'],
     desc:'USB Selective Suspend powers down USB devices when they appear idle, causing brief but real input dropouts on mice and keyboards mid-game. Disabling keeps all USB peripherals fully powered and always instantly responsive.',
     impact:`USB Selective Suspend puts USB devices to sleep after a period of inactivity to save power. When your mouse moves after a brief still period, the OS must wake the USB device — adding a small but real re-connection delay. During tense CS2 or Valorant moments (holding an angle, waiting to peek), a still mouse that suddenly moves may have 1–3ms of re-activation lag before the first input registers. Disabling this keeps all USB devices always-on.`,
     apply:`powercfg /SETACVALUEINDEX SCHEME_CURRENT 2a737441-1930-4402-8d77-b2bebba308a3 48e6b7a6-50f5-4782-a5d4-53bb8f07e226 0\npowercfg /SETACTIVE SCHEME_CURRENT`,
     revert:`powercfg /SETACVALUEINDEX SCHEME_CURRENT 2a737441-1930-4402-8d77-b2bebba308a3 48e6b7a6-50f5-4782-a5d4-53bb8f07e226 1\npowercfg /SETACTIVE SCHEME_CURRENT`},
    {id:'disable-hibernation',presetExclude:true,risky:true,riskNote:'Do NOT apply while Enable Fast Startup is active. Fast Startup writes a hiberfile on every Shutdown and resumes from it on next boot. If you disable hibernation while Fast Startup is enabled, the next Shutdown + boot will find no hiberfile and enter recovery mode. Disable Fast Startup first.',icon:'😴',name:'Disable Hibernation & Fast Startup',badges:['perf'],
     impact:`Fast Startup loads a partial OS state from hibernate instead of doing a fresh boot. This saves boot time but can load stale GPU driver states, stale audio driver states, and stale network driver states. In CS2 this manifests as GPU-related crashes, audio cutting out, or network adapter issues in the first session after boot.`,
     desc:'CS2 instability after waking from hibernate-based Fast Startup is a known issue. The GPU driver loads its previous state which may be incompatible with updates applied while hibernated. Disabling Fast Startup ensures a clean driver initialization on every boot — trading 20 seconds of boot time for session stability.',
     apply:`powercfg /h off\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Power" /v HiberbootEnabled /t REG_DWORD /d 0 /f`,
     revert:`powercfg /h on\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Power" /v HiberbootEnabled /t REG_DWORD /d 1 /f`},
    {id:'notifications',icon:'🔕',name:'Disable All Notification Toasts',badges:['perf','gpu'],
     impact:`Windows notification toasts cause the DWM compositor to render an overlay on top of your game for every notification. Each overlay render grabs the GPU for 8-20ms. A Discord message during a 1v1 clutch, a Steam friend going online during the pistol round — each notification is a visible frame hitch.`,
     desc:'CS2 players often notice a tiny stutter exactly when a Discord notification fires. That\'s not coincidence — the notification toast forces DWM to render an overlay, interrupting the GPU mid-frame. In Valorant, Riot\'s own client sends notifications that trigger the same effect.',
     apply:`reg add "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\PushNotifications" /v ToastEnabled /t REG_DWORD /d 0 /f\nreg add "HKCU\\SOFTWARE\\Policies\\Microsoft\\Windows\\CurrentVersion\\PushNotifications" /v NoToastApplicationNotification /t REG_DWORD /d 1 /f`,
     revert:`reg add "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\PushNotifications" /v ToastEnabled /t REG_DWORD /d 1 /f\nreg delete "HKCU\\SOFTWARE\\Policies\\Microsoft\\Windows\\CurrentVersion\\PushNotifications" /v NoToastApplicationNotification /f`},
    {id:'disable-defender-rt',presetExclude:true,risky:true,riskNote:'Disables Windows Defender real-time scanning. Your PC will not automatically detect or block malware while this is active. Only apply if you have an alternative antivirus solution, avoid downloading from untrusted sources, and understand the risk. Easy to revert.',icon:'🦠',name:'Disable Windows Defender Real-Time Scanning',badges:['perf'],
     impact:`Real-time protection scans every file access — including CS2's shader cache files, Valorant's game assets, and their temporary files. Every frame that accesses a new shader or texture triggers a Defender scan. During shader compilation (especially after updates), this can cause 100-500ms hitches.`,
     desc:'After CS2 updates, Defender scans newly downloaded game files in real-time, causing significant I/O competition during the first launch post-update. In Valorant, Vanguard\'s own driver files trigger Defender scans at startup. Excluding game folders from Defender scanning eliminates these scan-induced hitches.',
     apply:`reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows Defender" /v DisableAntiSpyware /t REG_DWORD /d 1 /f\nreg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows Defender\\Real-Time Protection" /v DisableRealtimeMonitoring /t REG_DWORD /d 1 /f`,
     revert:`reg delete "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows Defender" /v DisableAntiSpyware /f\nreg delete "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows Defender\\Real-Time Protection" /v DisableRealtimeMonitoring /f`},
    {id:'background-apps',icon:'📱',name:'Disable Background App Execution',badges:['perf'],
     impact:`Windows runs dozens of apps in the background consuming CPU and RAM constantly. Apps like OneDrive, Teams, Xbox app, and various OEM utilities silently consume resources during gaming. Each one might only use 1-2% CPU but 10 of them combined steal 10-20% of your CPU from CS2 and Valorant.`,
     desc:'CS2 is CPU-limited on most systems at high framerates. 10-20% CPU being consumed by background apps directly reduces your achievable FPS. In Valorant, background app CPU usage causes frame time spikes whenever they perform operations — file syncs, notification checks, update polls.',
     apply:`reg add "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\BackgroundAccessApplications" /v GlobalUserDisabled /t REG_DWORD /d 1 /f`,
     revert:`reg add "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\BackgroundAccessApplications" /v GlobalUserDisabled /t REG_DWORD /d 0 /f`},
    {id:'disable-cet',icon:'🔐',name:'Disable Unnecessary Background Services (Batch)',badges:['perf'],
     desc:'A batch of Windows services that run constantly but provide zero value during gaming: Connected User Experiences, Program Compatibility Assistant, Remote Registry, Tablet Input, Touch Keyboard, and more. Disabling these frees CPU scheduling time.',
     impact:`Disables a set of Windows services with zero gaming value: Connected User Experiences, Program Compatibility Assistant, Remote Registry, Tablet Input, and Map Services. These run background threads that compete for CPU scheduler slots. Fewer competing threads means the OS spends more of each millisecond running your game rather than servicing background work. Modest but consistent improvement to 1% lows in CS2 and Valorant.`,
     apply:`sc config "PcaSvc" start= disabled & sc stop "PcaSvc"\nsc config "TabletInputService" start= disabled & sc stop "TabletInputService"\nsc config "RemoteRegistry" start= disabled & sc stop "RemoteRegistry"\nsc config "DiagTrack" start= disabled & sc stop "DiagTrack"\nsc config "MapsBroker" start= disabled & sc stop "MapsBroker"\nsc config "lfsvc" start= disabled & sc stop "lfsvc"\nsc config "WSearch" start= disabled & sc stop "WSearch"`,
     revert:`sc config "PcaSvc" start= auto\nsc config "TabletInputService" start= auto\nsc config "RemoteRegistry" start= disabled\nsc config "MapsBroker" start= auto\nsc config "lfsvc" start= auto`},

    {id:'disable-auto-maintenance',icon:'🔧',name:'Disable Windows Automatic Maintenance',badges:['perf'],
     desc:'Windows Automatic Maintenance runs disk defrag, security scans, diagnostics, and system optimizations on a schedule — often triggering mid-session. Disabling prevents these tasks from stealing CPU, disk I/O, and RAM during your gaming sessions.',
     impact:`Windows Automatic Maintenance runs defrag, security scans, and diagnostics on a schedule — often triggering during your session without notification. These tasks can spike disk I/O and CPU usage for 30–60 seconds at a time, causing significant FPS drops mid-match in CS2 and Valorant. Disabling ensures your PC's resources are never pulled away by maintenance during gameplay.`,
     apply:`reg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Schedule\\Maintenance" /v MaintenanceDisabled /t REG_DWORD /d 1 /f\nreg add "HKCU\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Schedule\\Maintenance" /v MaintenanceDisabled /t REG_DWORD /d 1 /f`,
     revert:`reg delete "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Schedule\\Maintenance" /v MaintenanceDisabled /f\nreg delete "HKCU\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Schedule\\Maintenance" /v MaintenanceDisabled /f`},
    {id:'disable-cortana',icon:'🤖',name:'Disable Cortana & Search Indexing Hooks',badges:['perf'],
     desc:'Cortana runs background processes to index content and prepare search results continuously. Even if you never use it, it consumes CPU and RAM. Disabling it via policy removes all background Cortana and SearchUI activity.',
     impact:`Cortana's background indexing process runs continuously, making file system calls and consuming RAM even when never used. Disabling it frees 50–200MB of RAM and eliminates background CPU load that competes with your game. In CS2 and Valorant, the freed resources are particularly noticeable on 16GB systems where RAM pressure is the primary cause of texture streaming hiccups.`,
     apply:`reg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\Windows Search" /v AllowCortana /t REG_DWORD /d 0 /f\nreg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\Windows Search" /v DisableWebSearch /t REG_DWORD /d 1 /f\nreg add "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\Windows Search" /v ConnectedSearchUseWeb /t REG_DWORD /d 0 /f`,
     revert:`reg delete "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\Windows Search" /v AllowCortana /f\nreg delete "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\Windows Search" /v DisableWebSearch /f\nreg delete "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\Windows Search" /v ConnectedSearchUseWeb /f`},
    {id:'disable-print-spooler',icon:'🖨️',name:'Disable Unused Services Batch (Print, Fax, etc.)',badges:['perf'],
     desc:'A targeted set of services that are enabled by default but provide zero value on a gaming PC: Print Spooler, Fax, Retail Demo, Phone Service, Windows Error Reporting, and Connected Devices Platform. Each one runs threads and allocates memory doing nothing useful.',
     impact:`The Print Spooler, Fax, Clipboard Network Service, and Phone Service run background threads on every Windows PC regardless of whether you own a printer. These are pure overhead. Disabling this batch removes several always-running services from the CPU scheduler queue. Small but real reduction in background noise, contributing to cleaner frame times in CS2 and Valorant.`,
     apply:`sc config "Spooler" start= disabled & sc stop "Spooler"\nsc config "Fax" start= disabled & sc stop "Fax"\nsc config "RetailDemo" start= disabled & sc stop "RetailDemo"\nsc config "PhoneSvc" start= disabled & sc stop "PhoneSvc"\nsc config "WerSvc" start= disabled & sc stop "WerSvc"\nsc config "CDPSvc" start= disabled & sc stop "CDPSvc"\nsc config "OneSyncSvc" start= disabled & sc stop "OneSyncSvc"`,
     revert:`sc config "Spooler" start= auto & sc start "Spooler"\nsc config "WerSvc" start= manual\nsc config "CDPSvc" start= auto & sc start "CDPSvc"`},
    {id:'disable-startup-delay',icon:'🚀',name:'Remove Startup Delay for Background Apps',badges:['perf'],
     desc:'Windows artificially delays startup apps by 10 seconds to ensure the desktop is responsive first. This often means apps like Discord and Steam start late and scramble to initialize while your game is loading. Eliminating the delay gets everything ready before you launch.',
     impact:`Windows delays startup applications by 10 seconds after login to keep the desktop responsive. On a gaming PC this just means Discord, Steam, and NVIDIA overlay all try to initialise simultaneously 10 seconds into your session — causing a CPU and disk spike exactly when you're launching your game. Removing the delay spreads startup app load across the actual boot process so everything is settled before you click play.`,
     apply:`reg add "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Serialize" /v StartupDelayInMSec /t REG_DWORD /d 0 /f`,
     revert:`reg delete "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Serialize" /v StartupDelayInMSec /f`},
    {id:'disable-mpow',icon:'🔋',name:'Disable Monitor Power & Display Sleep',badges:['latency','perf'],
     desc:'When Windows is deciding whether to sleep the display, it polls various power state APIs every few seconds. During gameplay this polling adds tiny but consistent overhead. Setting monitor timeout to Never during gaming eliminates this background polling entirely.',
     impact:`When Windows considers sleeping the display, it polls power state APIs every few seconds. These polls generate small but consistent I/O and CPU interrupts. Since no gaming PC needs the monitor to sleep mid-session, disabling the sleep polling eliminates these unnecessary background wakeups. Reduces background interrupt rate, contributing to cleaner DPC latency readings in LatencyMon.`,
     apply:`powercfg /change monitor-timeout-ac 0\npowercfg /change standby-timeout-ac 0\npowercfg /change disk-timeout-ac 0`,
     revert:`powercfg /change monitor-timeout-ac 10\npowercfg /change standby-timeout-ac 30\npowercfg /change disk-timeout-ac 20`},
    {id:'disable-event-log',icon:'📋',name:'Disable Non-Critical Windows Event Logging',badges:['perf'],
     desc:'The Windows Event Log service writes thousands of entries per session to disk. During gaming, these disk writes compete with game asset streaming. Disabling the Application and System event logs (not Security) eliminates this constant background write traffic.',
     impact:`The Windows Event Log writes thousands of entries per gaming session to disk — every application start, network event, and security check generates log entries. These disk writes compete with game asset streaming. Disabling non-critical event logging reduces background disk I/O, which matters most on SATA SSDs and HDDs. In CS2 and Valorant, this primarily helps with map load times and texture streaming consistency.`,
     apply:`REM Only disable specific verbose event channels (never touch the eventlog service):\nwevtutil sl Microsoft-Windows-Diagnostics-Performance/Operational /e:false\nwevtutil sl Microsoft-Windows-UserPnp/ActionCenter /e:false\nwevtutil sl Microsoft-Windows-WindowsUpdateClient/Operational /e:false\nwevtutil sl Microsoft-Windows-AppXDeploymentServer/Operational /e:false\nwevtutil sl Microsoft-Windows-Store/Operational /e:false`,
     revert:`wevtutil sl Microsoft-Windows-Diagnostics-Performance/Operational /e:true\nwevtutil sl Microsoft-Windows-UserPnp/ActionCenter /e:true\nwevtutil sl Microsoft-Windows-WindowsUpdateClient/Operational /e:true\nwevtutil sl Microsoft-Windows-AppXDeploymentServer/Operational /e:true\nwevtutil sl Microsoft-Windows-Store/Operational /e:true`},
    {id:'handle-inheritance',icon:'🔗',name:'Reduce Handle Table & Object Manager Overhead',badges:['perf','latency'],
     desc:'Games create thousands of kernel handles (file handles, sync objects, memory maps). The default handle table grows dynamically causing reallocation pauses. Pre-committing a larger table eliminates the dynamic growth overhead during active gameplay.',
     impact:`Games create thousands of kernel handles (file handles, sync objects, memory maps). By default Windows allows these handles to be inherited by child processes, requiring the kernel to walk the handle table on every process creation. Restricting inheritance reduces the per-process handle table overhead. In CS2 which spawns several sub-processes for audio and crash handling, this reduces the overhead of those process creation events.`,
     apply:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager" /v HeapDeCommitFreeBlockThreshold /t REG_DWORD /d 262144 /f\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager" /v HeapSegmentCommit /t REG_DWORD /d 131072 /f\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager" /v HeapSegmentReserve /t REG_DWORD /d 262144 /f`,
     revert:`@echo off\nreg delete "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager" /v HeapDeCommitFreeBlockThreshold /f 2>nul\nreg delete "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager" /v HeapSegmentCommit /f 2>nul\nreg delete "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager" /v HeapSegmentReserve /f 2>nul\necho Heap settings reverted. Reboot recommended.\npause`},
  
    {id:'disable-vbs',icon:'🧱',name:'Disable Virtualization Based Security (VBS)',badges:['perf','latency'],risky:true,presetExclude:true,
     riskNote:'Disables VBS and Hyper-V. These protect the kernel from exploit-based attacks. On a dedicated gaming PC not used for sensitive work this is low risk. Re-enable before any financial/work use. Windows may re-enable VBS after major updates — re-run after each feature update.',
     impact:`VBS (Virtualization Based Security) runs Windows inside a hypervisor even when you have no virtual machines. Every kernel call crosses an extra virtualization boundary. Disabling it removes this overhead layer entirely — confirmed 5–15% FPS gains in CPU-heavy games like CS2 at high framerates, with measurable improvement to 1% lows and frame consistency.`,
     desc:'Virtualization Based Security adds a hypervisor layer even on gaming PCs with no VMs. This adds overhead to every kernel-to-userspace transition. Disabling it recovers 5–15% FPS in CPU-heavy scenarios and tightens 1% lows significantly.',
     apply:`@echo off
REM OPTI — Disable Virtualization Based Security (VBS)
REM Run as Administrator. Reboot required.

echo [1/3] Disabling Hyper-V...
bcdedit /set hypervisorlaunchtype off

echo [2/3] Disabling VBS via registry...
reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\DeviceGuard" /v EnableVirtualizationBasedSecurity /t REG_DWORD /d 0 /f
reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\DeviceGuard" /v RequirePlatformSecurityFeatures /t REG_DWORD /d 0 /f

echo [3/3] Disabling Memory Integrity (HVCI)...
reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\DeviceGuard\\Scenarios\\HypervisorEnforcedCodeIntegrity" /v Enabled /t REG_DWORD /d 0 /f

echo.
echo Reboot required. Check Settings > Windows Security > Device Security
echo after reboot to confirm Core Isolation is off.
pause`,
     revert:`@echo off
REM Re-enable VBS and Hyper-V
bcdedit /set hypervisorlaunchtype auto
reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\DeviceGuard" /v EnableVirtualizationBasedSecurity /t REG_DWORD /d 1 /f
reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\DeviceGuard\\Scenarios\\HypervisorEnforcedCodeIntegrity" /v Enabled /t REG_DWORD /d 1 /f
echo VBS restored. Reboot required.
pause`},
    {id:'gpu-msi-mode',icon:'⚡',name:'Enable GPU Message Signaled Interrupts (MSI Mode)',badges:['latency','gpu'],
     impact:`By default Windows uses line-based interrupts for GPU communication — a legacy mechanism where the GPU physically asserts a wire to signal the CPU. MSI mode replaces this with a memory-write, allowing the interrupt to be handled on any CPU core rather than always core 0. This eliminates interrupt contention between the GPU, NIC, and USB controller — the #1 cause of DPC latency spikes that appear as micro-stutters in CS2 and Valorant.`,
     desc:'Switches GPU interrupt delivery from legacy line-based mode to Message Signaled Interrupts. MSI mode allows GPU interrupts to be distributed across CPU cores, eliminating the core 0 interrupt bottleneck that causes DPC latency spikes and micro-stutters. Confirmed high-impact by Blur Busters and the competitive latency community.',
     apply:`@echo off
REM OPTI — Enable GPU MSI Mode via Registry
REM Finds NVIDIA/AMD GPU in PCI enum and sets MSISupported=1
REM Run as Administrator. Reboot required.

echo Enabling MSI mode for GPU(s) in PCI device registry...

REM Enable MSI for all VGA/display adapters via PowerShell
powershell -Command "
Get-WmiObject Win32_VideoController | ForEach-Object {
  $pnpId = $_.PNPDeviceID
  $regPath = 'HKLM:\\SYSTEM\\CurrentControlSet\\Enum\' + $pnpId + '\\Device Parameters\\Interrupt Management\\MessageSignaledInterruptProperties'
  if (!(Test-Path $regPath)) { New-Item -Path $regPath -Force | Out-Null }
  Set-ItemProperty -Path $regPath -Name MSISupported -Value 1 -Type DWord -Force
  Write-Host ('MSI enabled for: ' + $_.Name)
}
"

echo.
echo GPU MSI mode enabled. Reboot required for changes to take effect.
echo To verify: use MSI Utility v3 (Guru3D) after reboot.
pause`,
     revert:`@echo off
REM Disable GPU MSI Mode (restore line-based interrupts)
powershell -Command "
Get-WmiObject Win32_VideoController | ForEach-Object {
  $pnpId = $_.PNPDeviceID
  $regPath = 'HKLM:\\SYSTEM\\CurrentControlSet\\Enum\' + $pnpId + '\\Device Parameters\\Interrupt Management\\MessageSignaledInterruptProperties'
  if (Test-Path $regPath) {
    Set-ItemProperty -Path $regPath -Name MSISupported -Value 0 -Type DWord -Force
    Write-Host ('MSI disabled for: ' + $_.Name)
  }
}
"
echo GPU MSI mode reverted to line-based. Reboot required.
pause`},
    {id:'audio-latency',icon:'🔇',name:'Disable Audio Enhancements & Reduce Audio DPC Overhead',badges:['latency'],
     impact:`Windows audio enhancements (spatial sound, loudness equalization, virtual surround) run as DPC-level kernel callbacks on the same interrupt chain as mouse input and GPU frames. Each enhancement adds processing overhead to every audio interrupt. Disabling them reduces the DPC budget consumed by audio, leaving more interrupt capacity for GPU frame delivery and USB mouse input — tightening the whole latency chain.`,
     desc:'Windows audio enhancements and spatial sound features add kernel-level processing overhead to every audio interrupt. In CS2 and Valorant this competes with GPU and mouse interrupts for CPU time. Disabling enhancements and setting the audio device to exclusive mode reduces DPC latency in the audio stack.',
     apply:`@echo off
REM OPTI — Disable Audio Enhancements / Reduce Audio DPC Overhead
REM Run as Administrator

echo [1/3] Disabling audio enhancements globally...
reg add "HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\MMDevices\\Audio\\Render" /v "DeviceProperty_FxProperties" /t REG_SZ /d "" /f 2>nul

echo [2/3] Setting MMCSS for minimum audio overhead...
reg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile" /v "SystemResponsiveness" /t REG_DWORD /d 0 /f
reg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games" /v "GPU Priority" /t REG_DWORD /d 8 /f
reg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games" /v "Priority" /t REG_DWORD /d 6 /f
reg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games" /v "Scheduling Category" /t REG_SZ /d "High" /f

echo [3/3] Manual step required:
echo   Control Panel > Sound > Playback > [your device] > Properties
echo   Enhancements tab: check "Disable all enhancements"
echo   Advanced tab: check "Allow applications to take exclusive control"
echo.
echo Registry portion applied. Manual steps needed for per-device settings.
pause`,
     revert:`@echo off
reg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile" /v "SystemResponsiveness" /t REG_DWORD /d 20 /f
reg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games" /v "GPU Priority" /t REG_DWORD /d 2 /f
reg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games" /v "Priority" /t REG_DWORD /d 2 /f
reg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games" /v "Scheduling Category" /t REG_SZ /d "Medium" /f
echo Audio settings reverted.
pause`},
    {id:'flip-model',icon:'🖥️',name:'Enable Win11 Optimized Flip Model (Windowed Game Latency)',badges:['latency','fps'],
     impact:`Windows 11 introduced an optimized flip presentation model for windowed and borderless fullscreen games. The legacy compositor path introduces an extra frame buffer copy step. The flip model bypasses this — the game writes directly to the display flip queue. Microsoft confirmed this significantly reduces latency in DX10/DX11 windowed titles. CS2 in borderless window mode benefits directly from this setting.`,
     desc:'Enables the Windows 11 optimized flip presentation model for windowed and borderless fullscreen games. Bypasses the legacy compositor copy step, reducing input-to-display latency. Enables VRR and Auto HDR in windowed mode as a side effect.',
     apply:`@echo off
REM OPTI — Enable Optimized Flip Model for Windowed Games (Win11)
REM Run as Administrator

echo Enabling optimized flip presentation model...
reg add "HKCU\\Software\\Microsoft\\DirectX\\UserGpuPreferences" /v "DirectXUserGlobalSettings" /t REG_SZ /d "SwapEffectUpgradeEnable=1;" /f

echo Enabling VRR for windowed games...
reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\GraphicsDrivers" /v "HwFlipQueueLength" /t REG_DWORD /d 1 /f

echo.
echo Also enable in Settings manually:
echo   Settings > System > Display > Graphics > Change default graphics settings
echo   Turn ON: "Optimizations for windowed games"
echo   Turn ON: "Variable refresh rate"
pause`,
     revert:`@echo off
reg delete "HKCU\\Software\\Microsoft\\DirectX\\UserGpuPreferences" /v "DirectXUserGlobalSettings" /f 2>nul
reg delete "HKLM\\SYSTEM\\CurrentControlSet\\Control\\GraphicsDrivers" /v "HwFlipQueueLength" /f 2>nul
echo Flip model settings reverted.
pause`},
    {id:'disable-fso',icon:'🪟',name:'Disable Fullscreen Optimizations (Per-Game Override)',badges:['latency','fps'],
     impact:`Windows "Fullscreen Optimizations" intercepts exclusive fullscreen requests and silently converts them to a borderless overlay — adding the DWM compositor into the render path. For games where you have manually configured exclusive fullscreen (recommended for lowest latency), FSO undoes that setting. Disabling it via IFEO registry ensures the game actually gets true exclusive fullscreen, bypassing the compositor entirely for the lowest possible flip latency.`,
     desc:'Windows Fullscreen Optimizations silently converts exclusive fullscreen to a composited borderless mode. This adds the DWM render step back into the pipeline. Disabling via Image File Execution Options ensures CS2 and Valorant get true exclusive fullscreen when configured to use it.',
     apply:`@echo off

echo Fullscreen optimizations restored for CS2 and Valorant.

    {id:'ntfs-last-access',icon:'💾',name:'Disable NTFS Last Access Time Stamp',style:'sc',badges:['perf','disk'],
     impact:`Every file read on NTFS updates a "last access" timestamp, causing a write operation for every read. On SSDs this doubles I/O operations for game asset loading — CS2 and Valorant load hundreds of files per map. Disabling this removes a hidden write-on-read penalty.`,
     desc:'NTFS records the last access time for every file read. This means loading a texture in CS2 triggers both a read AND a write to update the timestamp. Disabling this halves disk I/O during game loading and reduces SSD wear. Windows 8+ already disables this on system volumes but it may be re-enabled by some tools.',
     apply:`@echo off
REM OPTI — Disable NTFS Last Access Time Stamp
REM Run as Administrator
echo Disabling NTFS last access time updates...
fsutil behavior set disablelastaccess 1
reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\FileSystem" /v NtfsDisableLastAccessUpdate /t REG_DWORD /d 1 /f
echo Done. No reboot needed.
pause`,
     revert:`@echo off
fsutil behavior set disablelastaccess 0
reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\FileSystem" /v NtfsDisableLastAccessUpdate /t REG_DWORD /d 0 /f
echo NTFS last access time restored.
pause`},
    {id:'svchost-split',icon:'⚙️',name:'Optimize SvcHost Process Splitting Threshold',style:'sc',badges:['perf','cpu'],
     impact:`Windows splits services into separate svchost.exe processes based on available RAM. On systems with 8GB+ RAM, increasing the split threshold ensures each service runs in its own process — preventing a misbehaving background service from consuming CPU time that belongs to your game.`,
     desc:'SvcHost splitting separates Windows services into individual processes. With the default threshold, many services share a single svchost.exe process, meaning one runaway service can spike CPU usage and steal time from your game thread. On 8GB+ systems, splitting all services ensures game CPU priority is respected.',
     apply:`@echo off
REM OPTI — Optimize SvcHost Split Threshold
REM Splits all services into individual processes on 8GB+ RAM systems
REM Run as Administrator
for /f "tokens=2 delims==" %%a in ('wmic os get TotalVisibleMemorySize /value') do set TOTALMEM=%%a
echo Total RAM: %TOTALMEM% KB
REM Set split threshold to 0 = always split (recommended for 8GB+)
reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control" /v SvcHostSplitThresholdInKB /t REG_DWORD /d 0 /f
echo SvcHost split threshold set to 0 (always split). Reboot required.
pause`,
     revert:`@echo off
REM Restore SvcHost split threshold to Windows default (3670016 KB = 3.5GB)
reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control" /v SvcHostSplitThresholdInKB /t REG_DWORD /d 3670016 /f
echo SvcHost split threshold restored. Reboot required.
pause`},
