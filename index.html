<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>OPTI — Windows Gaming Optimizer</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: clamp(13px, 1.05vw, 17px); }
html, body, #root { height: 100%; overflow: hidden; }

body {
  font-family: 'Rajdhani', -apple-system, sans-serif;
  background: #070a12;
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
  font-weight: 500;
}

:root {
  --mono:    'JetBrains Mono', monospace;
  --display: 'Rajdhani', sans-serif;
  --f2xs: 0.60rem;
  --fxs:  0.72rem;
  --fsm:  0.84rem;
  --fbase: 0.95rem;
  --flg:  1.08rem;
  --fxl:  1.30rem;
  --f2xl: 1.65rem;
  --f3xl: 2.20rem;
  --f4xl: 3.20rem;
}

/* ── BACKGROUND DOT GRID ──
   z-index:-1 → behind everything
   body bg is solid dark, dots are slightly brighter — visible in all
   GAPS between elements where body color shows through */
body::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: -1;
  background-image: radial-gradient(circle, #1e2d48 1.5px, transparent 1.5px);
  background-size: clamp(20px, 2vw, 28px) clamp(20px, 2vw, 28px);
  opacity: 0.7;
}

/* scrollbars */
::-webkit-scrollbar            { width: 3px; height: 3px; }
::-webkit-scrollbar-track      { background: transparent; }
::-webkit-scrollbar-thumb      { background: #1e2d48; }
::-webkit-scrollbar-thumb:hover{ background: #2a3e60; }

/* form elements */
select, option {
  background: #0d1120;
  border: 1px solid #1c2740;
  color: #f0f8ff;
  font-family: var(--mono);
  outline: none;
  cursor: pointer;
}
select:focus   { border-color: #00ffff; }
input:focus    { border-color: #00ffff !important; box-shadow: 0 0 0 2px #00ffff18; }
button         { font-family: inherit; cursor: pointer; }
textarea       { font-family: var(--mono); }

/* neon glow animations */
@keyframes pulse_g {
  0%,100% { box-shadow: 0 0 6px #00ff88; }
  50%     { box-shadow: 0 0 14px #00ff88, 0 0 28px #00ff8830; }
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: none; }
}

/* ── LIGHT MODE (body.light) ── */
body.light { background: #e8edf5; }
body.light::before {
  background-image: radial-gradient(circle, #9badc4 1.5px, transparent 1.5px);
  opacity: 0.55;
}
body.light select, body.light option {
  background: #f6f8fb; border-color: #c2cede; color: #0c1a2e;
}
body.light select:focus { border-color: #0058cc; }
body.light input:focus  { border-color: #0058cc !important; box-shadow: 0 0 0 2px #0058cc14; }
body.light ::-webkit-scrollbar-thumb      { background: #b0c0d4; }
body.light ::-webkit-scrollbar-thumb:hover{ background: #9badc4; }
body.light pre { background: #f0f3f8 !important; }
</style>
</head>
<body>
  <div id="root"></div>
  <script>const TWEAKS = {
  cpu: [
    {id:'ult-power',icon:'⚡',name:'Ultimate Performance Power Plan',badges:['perf','latency'],
     impact:`Ultimate Performance plan disables every power-saving feature that throttles your CPU between frames. In CS2, frame time consistency (not just average FPS) determines how smooth the game feels — ULP eliminates the microsecond clock speed dips between frames that create micro-stutter even at high average FPS.

**CS2 Impact:** Eliminates frame-time variance. CS2's Sub-tick system relies on precise CPU timing; any clock speed dip causes a 'desync' feel during movement.
**Valorant Impact:** Prevents Vanguard from triggering CPU power-state checks mid-match which can cause 1% low drops.`,
     desc:'CS2 runs best with completely consistent CPU clock speeds. Every time Windows drops your CPU from 5.0GHz to 4.8GHz to save power between frames, that transition costs microseconds. In Valorant with Vanguard running, those power state transitions add up across hundreds of frames per second.',
     apply:`REM Duplicate and activate Ultimate Performance power plan:\npowercfg -duplicatescheme e9a42b02-d5df-448d-aa00-03f14749eb61 2>nul\npowercfg /setactive e9a42b02-d5df-448d-aa00-03f14749eb61\nREM Verify: powercfg /getactivescheme should show Ultimate Performance`,
     revert:`powercfg /setactive 381b4222-f694-41f0-9685-ff5bb260df2e`},
    {id:'core-park',icon:'🅿️',name:'Disable CPU Core Parking',badges:['latency','perf'],
     impact:`Core parking puts CPU cores into a sleep state during quiet moments to save power. When a CS2 smoke grenade lands and 6 players suddenly need processing simultaneously, parked cores need 1-3ms to wake up — during which that processing is delayed. Disabling parking keeps all cores instantly available.`,
     desc:'CS2 executes benefit from all cores being awake: the engine needs to process multiple player positions, particle effects, and audio simultaneously. A single parked core waking up during an execute phase adds frame time variance. In Valorant, ability interactions (Sage wall + Brimstone smoke + Sova scan simultaneously) demand all cores immediately.',
     apply:`REM Step 1: Set registry policy (min AND max both to 0 = fully unparked)\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Power\\PowerSettings\\54533251-82be-4824-96c1-47b60b740d00\\0cc5b647-c1df-4637-891a-dec35c318583" /v ValueMin /t REG_DWORD /d 0 /f\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Power\\PowerSettings\\54533251-82be-4824-96c1-47b60b740d00\\0cc5b647-c1df-4637-891a-dec35c318583" /v ValueMax /t REG_DWORD /d 0 /f\nREM Step 2: Apply to the ACTIVE power scheme immediately (no reboot needed)\npowercfg /setacvalueindex scheme_current 54533251-82be-4824-96c1-47b60b740d00 0cc5b647-c1df-4637-891a-dec35c318583 0\npowercfg /setdcvalueindex scheme_current 54533251-82be-4824-96c1-47b60b740d00 0cc5b647-c1df-4637-891a-dec35c318583 0\npowercfg /setactive scheme_current\nREM Verify: open Task Manager > Performance > CPU — all cores should show activity`,
     revert:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Power\\PowerSettings\\54533251-82be-4824-96c1-47b60b740d00\\0cc5b647-c1df-4637-891a-dec35c318583" /v ValueMin /t REG_DWORD /d 0 /f\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Power\\PowerSettings\\54533251-82be-4824-96c1-47b60b740d00\\0cc5b647-c1df-4637-891a-dec35c318583" /v ValueMax /t REG_DWORD /d 100 /f\npowercfg /setacvalueindex scheme_current 54533251-82be-4824-96c1-47b60b740d00 0cc5b647-c1df-4637-891a-dec35c318583 100\npowercfg /setactive scheme_current`},
    {id:'timer-res',icon:'⌚',name:'Boost Windows Timer Resolution to 0.5ms',badges:['latency','perf'],
     impact:`Windows default timer fires 64 times per second (every 15.6ms) — the OS can only respond to frame requests at that rate. At 240Hz your game produces a frame every 4.17ms, meaning the default timer misses up to 3–4 frame delivery windows per frame. Forcing 0.5ms resolution (2000 checks/second) gives the scheduler 8 check points per 240Hz frame, so frame delivery, frame caps, and input processing all hit their targets accurately.

At 240Hz the improvement is dramatic: frame time variance drops from ±7ms to ±0.25ms. At 144Hz it drops from ±7ms to ±0.4ms. The registry key (GlobalTimerResolutionRequests) allows any app to request 0.5ms globally — you do NOT need to change this value based on your monitor Hz. 0.5ms is optimal for every refresh rate from 60Hz to 360Hz.

Note: this registry key allows apps to REQUEST 0.5ms resolution. CS2 and Valorant already request high-resolution timers when running — this ensures Windows honours those requests globally. For guaranteed 0.5ms even when no game is running, use the free SetTimerResolution tool alongside this reg key.

In CS2: consistent frame delivery means your 240Hz feels like a true 240Hz instead of fluctuating between 230–248Hz. In Valorant: Riot\'s engine uses high-frequency timer calls for anti-cheat sync and input processing — 0.5ms resolution ensures those calls complete in time.`,
     desc:'Windows default timer is 15.6ms — the scheduler only checks for work 64 times per second. Forcing 0.5ms (2000 checks/second) makes frame delivery, frame limiters, and CPU scheduling dramatically more accurate. Essential for 240Hz+ monitors. No Hz-specific config needed — 0.5ms is optimal for all refresh rates.',
     apply:`@echo off
reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\kernel" /v GlobalTimerResolutionRequests /t REG_DWORD /d 1 /f
REM Optional: also set via SetTimerResolution.exe (free tool) for guaranteed 0.5ms system-wide
REM Download: https://cms.lucashale.com/timer-resolution/`,
     revert:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\kernel" /v GlobalTimerResolutionRequests /t REG_DWORD /d 0 /f`},
    {id:'game-prio',icon:'🏆',name:'Boost Game Thread Priority (MMCSS)',badges:['perf','latency'],
     impact:`MMCSS (Multimedia Class Scheduler) elevates game threads to the highest scheduling class. In CS2, this means the main game thread is never preempted by background tasks — not Discord, not antivirus, not Windows Update checks. The game loop runs at the highest OS priority without needing manual priority setting.`,
     desc:'CS2 frames are generated by a tight render loop that must never be interrupted. MMCSS guarantees the game thread can\'t be preempted mid-frame by background services. In Valorant, Vanguard runs in a separate process — MMCSS ensures the game thread is always prioritized over Vanguard\'s background checks.',
     apply:`reg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile" /v SystemResponsiveness /t REG_DWORD /d 0 /f\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games" /v "GPU Priority" /t REG_DWORD /d 8 /f\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games" /v Priority /t REG_DWORD /d 6 /f\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games" /v "Scheduling Category" /t REG_SZ /d "High" /f`,
     revert:`reg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile" /v SystemResponsiveness /t REG_DWORD /d 20 /f\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games" /v "GPU Priority" /t REG_DWORD /d 2 /f\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games" /v Priority /t REG_DWORD /d 2 /f\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games" /v "Scheduling Category" /t REG_SZ /d "Medium" /f`},
    {id:'spectre',presetExclude:true,risky:true,riskNote:'Disables CPU hardware mitigations for Spectre and Meltdown vulnerabilities — side-channel attacks where malicious code can read memory it should not access. On a gaming-only PC with no untrusted code, risk is low. On any PC used for browsing or banking, this meaningfully reduces security. Gains 3–15% on kernel-heavy workloads like CS2 at high FPS.',icon:'🛡️',name:'Disable Spectre/Meltdown Mitigations',badges:['perf'],
     impact:`Spectre and Meltdown mitigations add 3-15% CPU overhead to every kernel-to-userspace transition. CS2 and Valorant make hundreds of kernel calls per second (network packets, audio, input). Disabling these mitigations on gaming PCs (which aren't shared servers with untrusted code) recovers that CPU overhead.`,
     desc:'CS2 performs kernel transitions for every network packet, every mouse input event, every sound playback. At 500+ FPS, kernel transitions happen thousands of times per second. Spectre mitigations add ~3-15% CPU overhead to each one. Disabling recovers FPS particularly on older CPUs (Skylake, Zen 1/2) where mitigations are most costly. SAFETY NOTE: This tweak is performance-focused but changes low-level system behavior. It will NOT prevent your PC from booting, and can be reverted anytime via the Undo button.',
     apply:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management" /v FeatureSettingsOverride /t REG_DWORD /d 3 /f\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management" /v FeatureSettingsOverrideMask /t REG_DWORD /d 3 /f`,
     revert:`@echo off\nreg delete "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management" /v FeatureSettingsOverride /f 2>nul\nreg delete "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management" /v FeatureSettingsOverrideMask /f 2>nul\necho Spectre/Meltdown mitigations restored. Reboot required.\npause`},
    {id:'foreground-prio',icon:'🎯',name:'Maximize Foreground App CPU Priority',badges:['perf','latency'],
     impact:`Separate from MMCSS, this registry key directly boosts the foreground process's CPU time quantum. CS2 and Valorant spend the entire match in the foreground — they get extended CPU time slices over all background processes, ensuring the game loop is never waiting for CPU time to become available.`,
     desc:'In CS2, every frame starts by checking for new inputs and network packets, then simulates, then renders. If the game has to wait for CPU time at the start of that cycle, every part is delayed. Boosted foreground priority ensures CS2 never waits for CPU time, reducing frame start latency.',
     apply:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\PriorityControl" /v Win32PrioritySeparation /t REG_DWORD /d 38 /f`,
     revert:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\PriorityControl" /v Win32PrioritySeparation /t REG_DWORD /d 2 /f`},
    {id:'c-states',icon:'😴',name:'Disable CPU C-States via Power Plan',badges:['latency','perf'],
     impact:`C-states are CPU sleep depths — C1 is light sleep, C6 is deep power-off. Deep C-states save significant power but require 1-10ms to exit when the game needs the core again. Limiting to C1 keeps your CPU cores in a shallow sleep that exits in microseconds, eliminating the wakeup latency penalty.`,
     desc:'CS2 workload is bursty: quiet aiming moments followed by intense firefight frames. If C-states drop cores to C6 during quiet moments, the first frame of an intense sequence suffers wakeup latency as cores emerge from deep sleep. In Valorant, C-state wakeup latency manifests as inconsistent frametimes in the first frames of ability impacts.',
     apply:`powercfg /setacvalueindex scheme_current sub_processor PROCTHROTTLEMIN 100\npowercfg /setacvalueindex scheme_current sub_processor PROCTHROTTLEMAX 100\npowercfg /setactive scheme_current`,
     revert:`powercfg /setacvalueindex scheme_current sub_processor PROCTHROTTLEMIN 5\npowercfg /setacvalueindex scheme_current sub_processor PROCTHROTTLEMAX 100\npowercfg /setactive scheme_current`},
    {id:'interrupt-affinity',icon:'🔀',name:'Set Interrupt Affinity for Isolated Cores',badges:['latency','cpu'],
     impact:`Pinning the NIC's DMA interrupt to a specific CPU core prevents network packet processing from competing with the game's main thread for the same core. CS2 uses one primary core for game logic — if a packet interrupt fires on that core mid-frame, it pauses the game frame. Separate cores eliminate this interference.`,
     desc:'CS2 main thread handles inputs, game state, and rendering prep on one primary core. If your NIC fires a packet interrupt on that same core at the wrong moment, the current frame computation is paused mid-execution. Binding NIC interrupts to a different core eliminates this interrupt-caused frametime variance.',
     apply:`REM Use Microsoft Interrupt Affinity Policy Tool (free download)\nREM OR use the registry approach to pin NIC IRQs to non-game cores:\nREM This requires knowing your device interrupt assignments from Device Manager\nREM General approach - set NIC to core 0, game runs on cores 2-N\nREM See: devmgmt.msc > Network Adapter > Properties > Advanced > Preferred Core`,
     revert:`REM Revert via Device Manager > Network Adapter > Properties > Advanced > Preferred Core > Default`},
    {id:'no-turbo-boost-throttle',icon:'🔥',name:'Disable Efficiency Mode / EcoQoS Throttle',badges:['perf','cpu'],
     desc:'Windows 11 can throttle CPU frequency for apps via EcoQoS or Efficiency Mode. Background processes can accidentally trigger this on adjacent processes including your game. This registry key disables thermal mitigation entirely for foreground processes.',
     impact:`Prevents Windows from silently halving your CPU's clock speed mid-game via EcoQoS. A background app (Discord, browser) can accidentally flag your game process as low-priority, causing the game to drop from 5GHz to 2.5GHz without warning. In CS2 and Valorant this shows as sudden FPS drops and inconsistent frame times — frames that should take 4ms take 10ms. Eliminating throttle ensures your CPU stays at full boost the entire session.`,
     apply:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Power\\EnergyEstimation\\TaggedEnergy" /v ThermalMitigationOff /t REG_DWORD /d 1 /f`,
     revert:`reg delete "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Power\\EnergyEstimation\\TaggedEnergy" /v ThermalMitigationOff /f`},
    {id:'idle-demote',icon:'📊',name:'Disable Idle Demote / Promote',badges:['latency','perf'],
     impact:`Idle promotion aggressively moves threads to higher C-states during brief pauses. In CS2, the render loop has intentional micro-pauses for synchronization — idle promotion treats these as idle time and starts dropping clock speeds. Disabling this keeps the CPU at peak performance throughout the entire game session.`,
     desc:'CS2\'s render thread briefly yields control during GPU sync operations. Idle promotion treats these yields as opportunities to throttle the CPU. By the time the thread resumes, the CPU may be at a lower frequency. Disabling idle demotion keeps clock speeds pinned during these synchronization yields.',
     apply:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Power\\PowerSettings\\54533251-82be-4824-96c1-47b60b740d00\\893dee8e-2bef-41e0-89c6-b55d0929964c" /v ValueMax /t REG_DWORD /d 0 /f\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Power\\PowerSettings\\54533251-82be-4824-96c1-47b60b740d00\\dfd10d17-d5eb-45dd-877a-9a34ddd15c82" /v ValueMax /t REG_DWORD /d 0 /f`,
     revert:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Power\\PowerSettings\\54533251-82be-4824-96c1-47b60b740d00\\893dee8e-2bef-41e0-89c6-b55d0929964c" /v ValueMax /t REG_DWORD /d 100 /f\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Power\\PowerSettings\\54533251-82be-4824-96c1-47b60b740d00\\dfd10d17-d5eb-45dd-877a-9a34ddd15c82" /v ValueMax /t REG_DWORD /d 100 /f`},
    {id:'pci-express-aspm',icon:'🔋',name:'Disable PCIe Active State Power Management',badges:['latency','perf'],
     impact:`GPU and NVMe respond instantly without PCIe wake-up delay. Reduces the latency between input and the GPU starting work.`,
     desc:'PCIe ASPM puts PCIe lanes (GPU, NIC, NVMe) into low-power states between data bursts. The wake-up latency adds microseconds of delay every time a device needs to transfer data. Disabling keeps all PCIe lanes at full speed permanently.',
     apply:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Power\\PowerSettings\\501a4d13-42af-4429-9fd1-a8218c268e20\\ee12f906-d277-404b-b6da-e5fa1a576df5" /v Attributes /t REG_DWORD /d 2 /f\npowercfg /setacvalueindex scheme_current 501a4d13-42af-4429-9fd1-a8218c268e20 ee12f906-d277-404b-b6da-e5fa1a576df5 0\npowercfg /setactive scheme_current`,
     revert:`powercfg /setacvalueindex scheme_current 501a4d13-42af-4429-9fd1-a8218c268e20 ee12f906-d277-404b-b6da-e5fa1a576df5 1\npowercfg /setactive scheme_current`},
    {id:'cpu-affinity-sched',icon:'🧩',name:'Optimize CPU Scheduler for Multi-Core Games',badges:['perf','latency'],
     impact:`Better multi-core distribution for game threads. Reduces cache thrashing between game and OS on 8-core+ CPUs.`,
     desc:'Enables SMT (Simultaneous Multi-Threading) optimization in the NT scheduler. On 8-core+ CPUs this ensures the scheduler intelligently distributes game threads across physical cores rather than logical cores, reducing cache contention between game and OS threads.',
     apply:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\kernel" /v DistributeTimers /t REG_DWORD /d 1 /f`,
     revert:`reg delete "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\kernel" /v DistributeTimers /f`},
    {id:'kernel-split-lock',icon:'🔓',name:'Disable Kernel Lock Contention Monitoring',badges:['perf','cpu'],
     desc:'The kernel performance monitor hooks into lock contention events to generate telemetry. This adds a small but consistent overhead to every synchronization primitive used by both the kernel and game threads. Disabling eliminates this monitoring overhead.',
     impact:`The kernel monitors lock contention events to generate internal telemetry — every time two threads compete for the same resource, a hook fires. Games create thousands of these per second across render, physics, and audio threads. Disabling the monitoring hook removes a consistent per-frame CPU overhead. In CS2 the gain is subtle but measurable in 1% low frametimes, which affects the smoothness you feel when spraying.`,
     apply:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\kernel" /v DisableLockViolationHandling /t REG_DWORD /d 1 /f`,
     revert:`reg delete "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\kernel" /v DisableLockViolationHandling /f`},
    {id:'msi-mode',icon:'⚡',name:'Enable MSI Mode for GPU (Message Signaled Interrupts)',badges:['latency','gpu'],
     desc:'By default GPUs use legacy INTx interrupts shared with other devices. MSI gives each device a dedicated interrupt channel, eliminating interrupt sharing conflicts and dramatically reducing DPC latency spikes. Use the free MSI Utility v3 tool to enable this for all devices at once.',
     impact:`Legacy INTx interrupts are shared across devices — your GPU, NIC, and audio card may all fire on the same interrupt line, causing delays. MSI gives each device its own dedicated interrupt channel. This is one of the most impactful latency tweaks available: DPC latency can drop from 500μs+ to under 100μs. In CS2 and Valorant, lower DPC latency means your GPU presents frames with less OS-level stall, directly reducing input-to-display latency by 1–3ms.`,
     apply:`REM Find your GPU in Device Manager > note the VEN and DEV IDs\nREM Navigate in regedit to:\nREM HKLM\\SYSTEM\\CurrentControlSet\\Enum\\PCI\\VEN_XXXX&DEV_XXXX\\...\nREM \\Device Parameters\\Interrupt Management\\MessageSignaledInterruptProperties\nREM Set MSISupported = 1\nREM Easier: use free tool "MSI Utility v3" to enable for all devices automatically`,
     revert:`REM Set MSISupported = 0 in the same registry path, or use MSI Utility v3`},
    {id:'affinity-network',icon:'📌',name:'Pin NIC Interrupts to Isolated CPU Core',badges:['latency','cpu','net'],
     desc:'When your NIC fires interrupts during heavy networking, it lands on whatever core is available — potentially the same core running your game thread. Pinning NIC interrupts to core 0 or 1 keeps network processing away from your game threads on cores 2+.',
     impact:`NIC interrupts fire on a random available core. If that's the same core your game's render thread is running on, the interrupt stalls the render thread for the duration of packet processing. Pinning NIC interrupts to core 0 creates a dedicated network handling core, keeping cores 2+ clean for game threads. In CS2 this reduces the micro-stutters that spike during molotov throws and smoke grenades when network traffic spikes.`,
     apply:`REM Use "Interrupt Affinity Policy Tool" (free from Microsoft)\nREM OR set via registry for your NIC device:\nREM HKLM\\SYSTEM\\CurrentControlSet\\Enum\\PCI\\<NIC_ID>\\Device Parameters\\Interrupt Management\\Affinity Policy\nREM Set DevicePolicy = 4 (IrqPolicySpecifiedProcessors)\nREM Set AssignmentSetOverride = 01 00 00 00 (core 0)`,
     revert:`REM Delete the Affinity Policy registry key or use Interrupt Affinity Policy Tool`},
    {id:'cpu-boost-voltage',icon:'⚡',name:'Disable CPU Speed Shift / Autonomous Mode (BIOS)',badges:['latency','cpu'],
     desc:'Intel Speed Shift (HWP) and AMD PBO autonomous modes let the CPU self-manage frequency without OS involvement. While fast, they can cause per-microsecond frequency jitter. Setting a fixed voltage/freq offset in BIOS and disabling autonomous mode gives the most consistent clock-per-clock performance.',
     impact:`Intel Speed Shift and AMD PBO constantly adjust CPU frequency within microseconds. This per-clock jitter means your game thread may be running at 4.8GHz for one frame and 5.1GHz the next, making frame times slightly inconsistent. Setting a fixed offset removes the frequency noise. In Valorant and CS2 competitive play, this tightens frame time variance so your framerate shows less standard deviation — what you feel as more consistent 'feel'.`,
     apply:`REM === BIOS SETTING ===\nREM Intel: Disable "Speed Shift Technology" or set HWP to Disabled\nREM       Or set "CPU Flex Ratio" to your max turbo frequency\nREM AMD: Set Precision Boost Overdrive to Manual or Disabled\nREM     Set CPU voltage to fixed offset rather than Auto\nREM Verify with HWiNFO64 that clock speed stays stable under game load`,
     revert:`REM Re-enable Speed Shift / PBO Auto in BIOS`},
    {id:'cpu-parking-affinity',icon:'🎯',name:'Set Game Process CPU Affinity via Registry',badges:['latency','perf'],
     desc:'Pre-configures specific CPU core affinity for common game executables via IFEO registry keys. When the game launches it automatically starts on your fastest dedicated cores, rather than Windows placing it wherever. No need to manually set affinity in Task Manager every session.',
     impact:`Pre-configures core affinity for game executables so when they launch they immediately run on the highest-performance cores without Windows needing to decide. On hybrid CPUs (Intel 12th+), games defaulting to E-cores instead of P-cores is a real issue. Forcing cs2.exe and VALORANT.exe to P-cores ensures the most critical game threads always get the fastest silicon.`,
     apply:`REM Set affinity for CS2 (runs on cores 0-5 = mask 63 decimal = 3F hex):\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Image File Execution Options\\cs2.exe" /v "Affinity" /t REG_DWORD /d 63 /f\nREM Set for Valorant:\nreg add "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Image File Execution Options\\VALORANT-Win64-Shipping.exe" /v "Affinity" /t REG_DWORD /d 63 /f\nREM Adjust the mask value to match your CPU (63 = first 6 cores)`,
     revert:`reg delete "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Image File Execution Options\\cs2.exe" /v Affinity /f\nreg delete "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Image File Execution Options\\VALORANT-Win64-Shipping.exe" /v Affinity /f`},
    {id:'smt-heterogeneous',hw:'intel',icon:'🔀',name:'Optimize Thread Director for Hybrid CPUs (Intel 12th+)',badges:['perf','latency'],
     desc:'On Intel 12th gen and newer (P-cores + E-cores), Windows Thread Director must be properly configured to keep game threads on P-cores and move background tasks to E-cores. Without this, your game threads can land on E-cores giving 30-40% lower IPC for those frames.',
     impact:`On Intel 12th gen+ CPUs, Windows Thread Director uses Cooperative Scheduling to place threads on P-cores or E-cores. Misconfigured, game threads land on E-cores while Discord lands on P-cores. Setting the heterogeneous policy correctly keeps your game's render and sim threads on P-cores exclusively. In CS2 and Valorant, this prevents the E-core fallback stutters seen on Raptor Lake systems at high scene complexity.`,
     apply:`REM Verify your BIOS has "Intel Thread Director" enabled\nREM Then ensure Windows updates are current (requires Win11 22H2+)\nREM Force game onto P-cores only via Process Lasso:\nREM Set your game's CPU class to "P-cores only"\nREM OR via registry (ITD registry config):\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\kernel" /v ThreadDirectorControl /t REG_DWORD /d 1 /f`,
     revert:`reg delete "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\kernel" /v ThreadDirectorControl /f`},
    {id:'dpc-interrupt-coalesce',icon:'🔔',name:'Disable Interrupt Coalescing (Force Per-Packet Interrupts)',badges:['latency','cpu'],
     desc:'Windows coalesces hardware interrupts into batches to reduce CPU overhead — but this adds up to 1ms of latency per batch. For gaming, per-packet interrupts are always better. This disables coalescing at the kernel interrupt controller level.',
     impact:`Windows groups hardware interrupts into batches to reduce overall CPU interrupt rate — good for energy efficiency, bad for latency. The coalescing delay adds up to 1ms between when hardware fires an interrupt and when the OS services it. Disabling coalescing forces per-packet interrupt delivery. In CS2, this means your mouse movement and network packets are processed immediately rather than being held until the next batch window.`,
     apply:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\kernel" /v CoalescingTimerInterval /t REG_DWORD /d 0 /f`,
     revert:`reg delete "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\kernel" /v CoalescingTimerInterval /f`},
    {id:'dpc-watchdog',icon:'🐕',name:'Disable DPC Watchdog to Reduce Stall Overhead',badges:['latency','cpu'],
     desc:'The DPC watchdog monitors for deferred procedure calls that run too long and intervenes. Its monitoring loop adds consistent overhead to every DPC. On stable systems with updated drivers, disabling it removes this overhead layer completely.',
     impact:`The DPC watchdog monitors for deferred procedure calls that take too long and schedules interventions. Its monitoring fires continuously, adding background overhead to all kernel transitions. Disabling it eliminates the overhead. In Valorant and CS2, fewer kernel-level interruptions means tighter frame timing consistency — particularly visible in 1% low framerate readings.`,
     apply:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\kernel" /v DpcWatchdogProfileOffset /t REG_DWORD /d 0 /f`,
     revert:`reg delete "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\kernel" /v DpcWatchdogProfileOffset /f`},
    {id:'kernel-timer-boost',icon:'⏩',name:'Enable Kernel Timer Boost for Threads',badges:['latency','perf'],
     desc:'When a thread is woken from a wait state (e.g. your game waiting for a vsync or network packet), Windows can give it a temporary priority boost so it runs immediately. Enabling this means game threads get CPU time the instant they are ready, not the next scheduler quantum.',
     impact:`When a game thread wakes from a wait state (waiting for vsync, a network packet, or a mutex), Windows applies a priority boost that decays over time. The default boost duration is tuned for general desktop apps. Increasing the boost duration keeps game threads at elevated priority longer after waking, reducing re-scheduling latency. In CS2 this means your render thread gets CPU time faster after each vsync signal, tightening the input-to-display pipeline.`,
     apply:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\kernel" /v ThreadDpcEnable /t REG_DWORD /d 1 /f`,
     revert:`reg delete "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\kernel" /v ThreadDpcEnable /f`},
    {id:'irql-boost',presetExclude:true,risky:true,riskNote:'Disables SEHOP — a Windows security feature that blocks SEH chain exploit techniques. Gaming FPS gain is negligible. Only apply on a dedicated gaming PC if you accept the minor security tradeoff.',icon:'🚀',name:'Disable SEHOP Security Check (Marginal Kernel Gain)',badges:['latency','cpu'],
     desc:'This sets DisableExceptionChainValidation, which disables SEHOP — a Windows security feature that validates the exception handler chain to block SEH overwrite exploits. The name is misleading: this has nothing to do with IRQL. The gaming benefit is negligible on modern CPUs. Only apply on a dedicated gaming PC where you understand the security tradeoff.',
     impact:`Removes a per-exception SEHOP validation check. Real-world FPS gain is unmeasurable on modern hardware. The tradeoff is real: SEHOP protects against a class of exploits that overwrite Windows structured exception handlers. Low practical risk on a patched gaming-only PC, but not a meaningful performance gain.`,
     apply:`reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\kernel" /v DisableExceptionChainValidation /t REG_DWORD /d 1 /f`,
     revert:`reg delete "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\kernel" /v DisableExceptionChainValidation /f`},
  ],
  intel: [
    {id:'intel-speed-shift',hw:'intel',icon:'⚡',name:'Intel Speed Shift / HWP — Max Performance',badges:['latency','perf','cpu'],
     impact:`CPU jumps to full boost clock instantly when a game needs it. No more frequency ramp lag between frame start and peak performance.`,
     desc:'Intel CPUs boost individual cores higher than all-core turbo. Games using 6-12 threads rarely benefit from single-core turbo. Locking to max all-core turbo gives consistent, predictable clocks every frame — eliminating per-frame frequency variance that causes 1% low spikes.',
     apply:`REM Method 1 — BIOS (recommended):\nREM Advanced > CPU Configuration > Per Core Turbo Ratio\nREM Set ALL cores to your max single-core turbo (e.g. 52 for 5.2GHz)\nREM\nREM Method 2 — Intel XTU (free download from Intel):\nREM Core Ratio Limit = your max all-core boost\nREM\nREM Method 3 — Registry (requires intelppm driver):\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Services\\intelppm\\Parameters" /v ProcessorPerformanceMaximum /t REG_DWORD /d 100 /f\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Services\\intelppm\\Parameters" /v ProcessorPerformanceMinimum /t REG_DWORD /d 100 /f\nREM\nREM Verify stability: Prime95 small FFTs for 15 min, HWiNFO64 for clock consistency`,
     revert:`reg delete "HKLM\\SYSTEM\\CurrentControlSet\\Services\\intelppm\\Parameters" /v ProcessorPerformanceMaximum /f\nreg delete "HKLM\\SYSTEM\\CurrentControlSet\\Services\\intelppm\\Parameters" /v ProcessorPerformanceMinimum /f`},
    {id:'intel-e-core',hw:'intel',icon:'🧩',name:'Intel Hybrid (P+E Core) — Thread Director Gaming Setup',badges:['perf','latency','cpu'],
     desc:'On Intel 12th gen+ (Alder Lake, Raptor Lake) with P-cores and E-cores, Windows must place game threads on P-cores. Without proper Thread Director config, game threads can land on E-cores causing 30-40% lower IPC for those frames. This ensures proper scheduling.',
     impact:`On Intel 12th/13th/14th gen hybrid CPUs, E-cores handle background tasks while P-cores handle the game. Proper Thread Director configuration ensures your game never gets migrated to E-cores during high load moments. In CS2, correct P/E-core assignment prevents the 10–20ms frame spikes seen when the game is migrated mid-frame to lower-frequency E-cores during intense smoke/fire scenarios.`,
     apply:`REM Windows 11 22H2+ is required for full Intel Thread Director support\nREM\nREM Step 1: Enable in BIOS\nREM Advanced > CPU Configuration > Intel Thread Director = Enabled\nREM\nREM Step 2: Registry enable Thread Director control:\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\kernel" /v ThreadDirectorControl /t REG_DWORD /d 1 /f\nREM\nREM Step 3: For heavy games, use Process Lasso (free) to force game .exe to P-cores only:\nREM Right-click game process > CPU Affinity > P-Core Only preset\nREM\nREM Verify: Task Manager > CPU graph showing P-cores under load during gaming`,
     revert:`reg delete "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\kernel" /v ThreadDirectorControl /f`},
    {id:'intel-ring-cache',hw:'intel',icon:'💾',name:'Intel Ring Bus & Cache Frequency Optimization',badges:['latency','cpu'],
     desc:'Intel CPUs have a Ring Bus connecting cores to the Last Level Cache. The Ring and Cache frequency can be set independently in BIOS. Matching or slightly overclocking the Ring Bus to core frequency reduces cache access latency, which is directly felt in game as better 1% lows.',
     impact:`The Intel Ring Bus connects all CPU cores to the Last Level Cache. If Ring frequency runs slower than Core frequency, cache latency increases — game data fetches take longer. Setting Ring to match Core frequency ensures your game's working set (maps, textures, animations) is served from L3 cache at full speed. In CS2 and Valorant, this reduces the frame variance caused by L3 cache miss stalls on heavy scenes.`,
     apply:`REM BIOS Setting only (cannot be done in Windows):\nREM Advanced > CPU Configuration > Ring Ratio / Cache Ratio\nREM Target: Set Cache/Ring ratio to max all-core turbo OR max stable value\nREM Example: 5.1GHz all-core, set ring to 48-50 (4.8-5.0GHz)\nREM\nREM Test stability:\nREM Run Cinebench R23 multi-core stress test for 10+ minutes\nREM Monitor with HWiNFO64 > Ring Bus Frequency\nREM\nREM DO NOT set higher than core frequency or system will crash`,
     revert:`REM Revert in BIOS: set Cache Ratio back to Auto`},
    {id:'intel-imc',hw:'intel',icon:'⚡',name:'Intel XMP / EXPO Memory Profile Enable',badges:['perf','latency'],
     desc:'Intel CPUs default RAM to JEDEC minimum speeds (often 4800MHz when your kit is rated 6000MHz+). Enabling XMP in BIOS activates the memory manufacturer tested profile, giving you the full rated speed and timings — directly improving game frame pacing and load times.',
     impact:`Intel CPUs ship with RAM defaulting to JEDEC minimum speeds (often 4800MHz even if your kit is rated 6000MHz). Enabling XMP in BIOS brings your RAM to its rated speed, reducing memory latency by 20–40%. In CS2, faster memory means the game's map streaming and entity tracking systems get data from RAM faster — visible in faster texture pop-in and lower 1% lows during smoke and grenade explosions.`,
     apply:`REM BIOS Setting — Intel platform:\nREM Advanced > Memory Configuration > XMP Profile = Profile 1\nREM\nREM If unstable with XMP Profile 1:\nREM Try Profile 2 (looser timings, same speed)\nREM Or manually lower speed by 200MHz while keeping XMP timings\nREM\nREM Verify in Windows:\nCPU-Z > Memory tab > check "Channels #" = Dual\nCPU-Z > Memory > DRAM Frequency should show half your rated speed (DDR5: 3000=6000)\nREM\nREM Also verify dual-channel: RAM slots 2+4, not 1+2`,
     revert:`REM BIOS: Set XMP = Disabled or JEDEC Auto`},
    {id:'intel-power-limit',hw:'intel',icon:'🔋',name:'Intel Power Limit Unlock (PL1/PL2)',badges:['perf','cpu'],
     desc:'Intel locks PL1 (sustained power) below maximum to protect cheap motherboards. On gaming systems this causes throttling mid-session. Setting PL1=PL2=maximum wattage lets the CPU run at full Turbo indefinitely — critical for sustained gaming performance.',
     impact:`Intel restricts the CPU's sustained power draw (PL1) to protect motherboard VRMs on budget boards. On gaming systems with capable VRMs, unlocking PL1 = PL2 lets the CPU maintain its full boost clock indefinitely instead of throttling after 56 seconds. In CS2 and Valorant during long sessions, this prevents the subtle FPS creep-down that happens after ~1 minute of sustained load when PL1 kicks in.`,
     apply:`REM Method 1 — BIOS (most reliable):\nREM Advanced > CPU Configuration > Power Limits\nREM PL1 = PL2 = your CPU TDP max (e.g. 253W for i9-13900K)\nREM Tau (time limit) = 56 seconds → set to 0 (unlimited)\nREM\nREM Method 2 — Intel XTU:\nREM Processor Power Limit 1 = max wattage\nREM Processor Power Limit 2 = max wattage\nREM\nREM Method 3 — ThrottleStop (free):\nREM Enable "Disable BD PROCHOT" if throttling persists\nREM Monitor: HWiNFO64 > CPU Package Power = should not drop during gaming`,
     revert:`REM BIOS: Reset PL1/PL2 to Default\nREM XTU: Reset to Default`},
  ],
  amd: [
    {id:'amd-pbo',hw:'amd',icon:'🔴',name:'AMD Precision Boost Overdrive (PBO) Setup',badges:['perf','cpu'],
     impact:`CPU runs at higher sustained clocks during gaming sessions. More FPS headroom before hitting CPU bottleneck.`,
     desc:'AMD Ryzen PBO allows the CPU to boost beyond stock limits using available thermal headroom. For gaming, PBO Scalar 1x with +200MHz boost offset gives predictable high clocks without the instability of aggressive auto-PBO. Pair with Curve Optimizer negative offset for stable higher clocks.',
     apply:`REM BIOS Configuration — AMD Ryzen CPUs:\nREM Advanced > AMD Overclocking > Precision Boost Overdrive:\n\nREM --- CONSERVATIVE (gaming stable) ---\nREM PBO: Enabled\nREM PBO Scalar: 1x\nREM Boost Clock Override: +100 to +200 MHz\nREM Curve Optimizer: Per Core, all cores -10\n\nREM --- AGGRESSIVE (test stability) ---\nREM PBO Scalar: 3-5x\nREM Boost Clock Override: +200 MHz\nREM Curve Optimizer: Per Core, all cores -20 to -30\n\nREM Power Limits (example for 7700X/7800X3D):\nREM PPT: 142W, TDC: 95A, EDC: 140A\nREM (adjust based on your specific CPU model)\n\nREM Windows registry for AMD power profile:\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Services\\amdppm\\Parameters" /v ProcessorPerformanceMaximum /t REG_DWORD /d 100 /f\npowercfg /setacvalueindex scheme_current sub_processor PERFBOOSTMODE 2\npowercfg /setactive scheme_current`,
     revert:`reg delete "HKLM\\SYSTEM\\CurrentControlSet\\Services\\amdppm\\Parameters" /v ProcessorPerformanceMaximum /f\nREM BIOS: Set PBO = Auto or Disabled`},
    {id:'amd-x3d-latency',hw:'amd',icon:'🏆',name:'AMD 3D V-Cache (X3D) Gaming Optimization',badges:['latency','cpu'],
     impact:`Ensures Windows routes game threads to the V-Cache CCD. Maximizes the cache advantage that makes X3D CPUs dominant in gaming.`,
     desc:'AMD X3D CPUs (5800X3D, 7800X3D, 7900X3D, 7950X3D) have a massive 96-192MB L3 cache that transforms cache-bound games. The 7950X3D has two CCDs — Windows 11 23H2+ handles V-Cache CCD prioritization automatically, but older Windows and the 5800X3D need manual help.',
     apply:`REM For ALL X3D CPUs:\nREM Windows Settings > Gaming > Game Mode = ON (critical)\nREM This enables scheduler awareness for X3D topology\n\nREM For 7950X3D / 7900X3D only (dual-CCD):\nREM Chipset driver 4.10.0+ required\nREM Windows 11 23H2+ handles V-Cache CCD routing automatically\nREM\nREM Registry: Thread Director for V-Cache preference:\nreg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\kernel" /v ThreadDirectorControl /t REG_DWORD /d 1 /f\n\nREM Optional: Disable SMT for pure gaming (5800X3D specific):\nREM BIOS: Simultaneous Multi-Threading = Disabled\nREM Can improve 1% lows by 5-15% on some games\n\nREM Verify with CPU-Z:\nREM L3 Cache should show 96MB (5800X3D) or 64MB per CCD (7xxx)`,
     revert:`reg delete "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\kernel" /v ThreadDirectorControl /f`},
    {id:'amd-expo-xmp',hw:'amd',icon:'💾',name:'AMD EXPO / XMP Memory Profile Enable',badges:['perf','latency'],
     desc:'AMD Ryzen CPUs are extremely sensitive to memory speed and latency — more so than Intel. EXPO (AMD) and XMP (Intel) profiles activate the rated memory speed. On AM5 (Ryzen 7000+) running 6000MHz CL30 is the sweet spot for Infinity Fabric 1:1 ratio.',
     impact:`AMD Ryzen CPUs are uniquely sensitive to memory speed and latency — the Infinity Fabric runs synchronised to memory, so slow RAM means a slow Fabric. Most kits ship running at 2133–4800MHz even when rated 6000MHz+. Enabling EXPO brings your RAM to its rated speed and can cut memory latency by 30–50%. In CS2 and Valorant, Ryzen 7000/9000 CPUs can see 10–20% FPS gains from correct EXPO — one of the highest-impact changes available.`,
     apply:`REM BIOS Setting — AMD platform:\nREM Advanced > DOCP/EXPO Profile = Profile 1\n\nREM AM5 SWEET SPOT: DDR5-6000 CL30 (Infinity Fabric 1:1 ratio)\nREM If your RAM is DDR5-6400+, enable EXPO then set to 6000MHz\nREM Infinity Fabric 1:1 at 6000 = FCLK 3000\n\nREM AM4 SWEET SPOT: DDR4-3600 CL16 or CL18 (IF 1800)\nREM\nREM Verify with CPU-Z or HWiNFO64:\nREM Memory > DRAM Frequency = 3000 (shows half, so 6000 effective)\nREM Memory > Channels = Dual\nREM\nREM If system won't POST: clear CMOS and try lower speed`,
     revert:`REM BIOS: DOCP/EXPO = Disabled or JEDEC Auto`},
    {id:'amd-fclk',hw:'amd',icon:'⚙️',name:'AMD Infinity Fabric Clock (FCLK) Tuning',badges:['latency','perf'],
     desc:'The Infinity Fabric connects CPU cores, I/O die, and memory controller. Its clock (FCLK) directly affects inter-core communication latency. Running FCLK at 1:1 ratio with memory controller (MCLK) eliminates cross-domain latency penalty — critical for frame time consistency.',
     impact:`The Infinity Fabric (FCLK) connects Ryzen's CPU cores, I/O die, and memory controller. At 1:1 FCLK:MCLK ratio (e.g. 3000MHz FCLK for 6000MT/s DDR5), latency is minimised. If FCLK is below memory clock, an asynchronous divider adds ~10ns of latency to every memory access. In CS2, correct FCLK tuning cuts the memory latency that shows up in frame time variance during fast-paced gunfights.`,
     apply:`REM BIOS Setting — AMD Ryzen:\nREM Advanced > AMD Overclocking > FCLK Frequency\n\nREM AM5 (Ryzen 7000 series):\nREM RAM at 6000MHz (DDR5) = MCLK 3000 = set FCLK 3000\nREM RAM at 5600MHz (DDR5) = MCLK 2800 = set FCLK 2800\n\nREM AM4 (Ryzen 5000 series):\nREM RAM at 3600MHz (DDR4) = MCLK 1800 = set FCLK 1800\nREM RAM at 3200MHz (DDR4) = MCLK 1600 = set FCLK 1600\n\nREM Warning: FCLK instability causes random crashes\nREM Test with OCCT memory test for 30 minutes before considering stable\n\nREM If 1:1 fails, use BIOS FCLK Auto (2:1 mode) — still better than JEDEC`,
     revert:`REM BIOS: FCLK Frequency = Auto`},
    {id:'amd-power-plan',hw:'amd',icon:'⚡',name:'AMD Ryzen Power Plan (Chipset Driver Plan)',badges:['latency','perf'],
     desc:'The AMD chipset driver installs a "AMD Ryzen Balanced" power plan that is specifically tuned for Ryzen boost behavior — it allows faster P-state transitions than Windows Balanced while avoiding the constant 100% voltage of Ultimate Performance. This is generally better for Ryzen than Ultimate Performance.',
     impact:`The AMD Ryzen Balanced power plan from the chipset driver includes Ryzen-specific governor logic that responds faster to frequency requests than the generic Windows plans. On standard Windows High Performance plan, Ryzen can take 30–50ms to ramp from idle to boost — the AMD plan cuts this to under 1ms. In CS2 and Valorant, this eliminates the subtle stutter at the start of rounds when the CPU is cold and needs to ramp up fast.`,
     apply:`REM Install latest AMD chipset drivers first (amd.com/en/support)\nREM The Ryzen Balanced plan is installed automatically\n\nREM Set AMD Ryzen Balanced as active plan:\npowercfg /setactive AMD Ryzen Balanced\nREM If the above fails (name varies), list all plans:\npowercfg /list\nREM Then activate using the GUID shown for "AMD Ryzen Balanced"\n\nREM Alternatively, use Ultimate Performance for pure gaming:\npowercfg -duplicatescheme e9a42b02-d5df-448d-aa00-03f14749eb61\npowercfg /setactive e9a42b02-d5df-448d-aa00-03f14749eb61`,
     revert:`powercfg /setactive 381b4222-f694-41f0-9685-ff5bb260df2e`},
    {id:'amd-curve-optimizer',hw:'amd',icon:'📊',name:'AMD Curve Optimizer Per-Core Tuning',badges:['perf','cpu'],
     desc:'Curve Optimizer lets you apply a per-core voltage offset to each individual core. Ryzen CPUs have natural variation between cores — the best cores (lowest voltage needed for a given frequency) can run faster with a negative offset. This is the single most impactful free performance unlock on Ryzen.',
     impact:`Every Ryzen CPU has cores that can boost higher than others. Curve Optimizer lets you lower the voltage on weaker cores and raise it on the strongest core, pushing your best core (where the game thread runs) to 100–200MHz higher. In CS2 and Valorant — which are primarily single-threaded bottlenecked — boosting your best core's ceiling directly translates to higher average FPS and tighter 1% lows.`,
     apply:`REM BIOS only — AMD Overclocking > Precision Boost Overdrive > Curve Optimizer\n\nREM STEP 1: Identify best cores using CoreCycler (free tool):\nREM Download: github.com/sp00n/corecycler\nREM Run for 30-60 min, note which cores have most stability\n\nREM STEP 2: Start conservative (all cores -5), test stability:\nREM OCCT CPU test 20 minutes — if stable, increase magnitude\n\nREM STEP 3: Progressive tuning:\nREM All cores: -10 (stable for most Ryzen 5000/7000)\nREM Best cores can usually handle -20 to -30\nREM Weak cores may only take -5 to -10\n\nREM STEP 4: Final validation:\nREM Cinebench R23 5x run + gaming session = stable system`,
     revert:`REM BIOS: Curve Optimizer = All Cores = 0 (disable)`},
  ],
  nvidia: [
    {id:'nvcp-latency-profile',icon:'🟢',name:'NVIDIA Control Panel — Low Latency Profile',badges:['latency','gpu'],
     impact:`NVIDIA's Low Latency mode reduces the GPU's pre-rendered frame queue from 3 frames to 1. This cuts the lag between mouse movement and the corresponding frame appearing on screen by up to 2–4ms. Combined with Max Performance power mode (which keeps GPU clocks pinned at boost speed with no ramp-up delay), this is the highest-impact single NVCP configuration for CS2 and Valorant.`,
     desc:'Sets NVIDIA GPU to maximum clock speed at all times and reduces the flip queue to 1 frame. Eliminates GPU clock ramp-up latency and minimises the render queue depth. The registry writes target the correct per-GPU path (HKLM\\Control\\Video\\{GUID}\\0000) which works on all modern drivers.',
     apply:`@echo off
REM OPTI — NVIDIA Low Latency Profile
REM Uses PowerShell to find your GPU's actual registry path (GUID-based)
REM Run as Administrator. Reboot recommended.

echo Locating NVIDIA GPU registry key...
for /f "delims=" %%P in ('powershell -NoProfile -Command "^
(Get-ChildItem 'HKLM:\\SYSTEM\\CurrentControlSet\\Control\\Video' -Recurse -EA SilentlyContinue ^| ^
 Where-Object { try{(Get-ItemProperty $_.PSPath -EA SilentlyContinue).'Device Description' -like '*NVIDIA*'}catch{$false} } ^| ^
 Where-Object { $_.PSChildName -eq '0000' } ^| Select-Object -First 1 -ExpandProperty PSPath) -replace 'Microsoft.PowerShell.Core\\\\Registry::',''
"') do set GPU_KEY=%%P

if "%GPU_KEY%"=="" (
  echo ERROR: NVIDIA GPU registry path not found. Ensure NVIDIA drivers are installed.
  pause & exit /b 1
)
echo Found: %GPU_KEY%

echo [1/2] Setting Power Management to Max Performance...
reg add "%GPU_KEY%" /v "PowerMizerEnable" /t REG_DWORD /d 1 /f
reg add "%GPU_KEY%" /v "PowerMizerLevel" /t REG_DWORD /d 1 /f
reg add "%GPU_KEY%" /v "PowerMizerLevelAC" /t REG_DWORD /d 1 /f
reg add "%GPU_KEY%" /v "PerfLevelSrc" /t REG_DWORD /d 8738 /f

echo [2/2] Reducing flip queue depth...
reg add "HKLM\\SYSTEM\\CurrentControlSet\\Control\\GraphicsDrivers" /v "HwFlipQueueLength" /t REG_DWORD /d 1 /f

echo.
echo Registry done. Also set these in NVIDIA Control Panel manually:
echo   Manage 3D Settings:
echo   - Low Latency Mode        : Ultra
echo   - Power Management Mode   : Prefer Maximum Performance
echo   - Max Frame Rate          : [your monitor Hz]
echo   - VSync                   : Off
echo.
echo Reboot for changes to take full effect.
pause`,
     revert:`@echo off
REM OPTI — Revert NVIDIA Low Latency Profile
for /f "delims=" %%P in ('powershell -NoProfile -Command "^
(Get-ChildItem 'HKLM:\\SYSTEM\\CurrentControlSet\\Control\\Video' -Recurse -EA SilentlyContinue ^| ^
 Where-Object { try{(Get-ItemProperty $_.PSPath -EA SilentlyContinue).'Device Description' -like '*NVIDIA*'}catch{$false} } ^| ^
 Where-Object { $_.PSChildName -eq '0000' } ^| Select-Object -First 1 -ExpandProperty PSPath) -replace 'Microsoft.PowerShell.Core\\\\Registry::',''
"') do set GPU_KEY=%%P

if "%GPU_KEY%"=="" ( echo GPU key not found. & pause & exit /b 1 )

reg delete "%GPU_KEY%" /v "PowerMizerEnable" /f 2>nul
reg delete "%GPU_KEY%" /v "PowerMizerLevel" /f 2>nul
reg delete "%GPU_KEY%" /v "PowerMizerLevelAC" /f 2>nul
reg delete "%GPU_KEY%" /v "PerfLevelSrc" /f 2>nul
reg delete "HKLM\\SYSTEM\\CurrentControlSet\\Control\\GraphicsDrivers" /v "HwFlipQueueLength" /f 2>nul
echo NVIDIA Low Latency profile reverted. Reboot recommended.
pause`},
    {id:'nvcp-fps-profile',icon:'🟢',name:'NVIDIA Control Panel — Max FPS Profile',badges:['fps','gpu'],

 Where-Object { $_.PSChildName -eq '0000' } ^| Select-Object -First 1 -ExpandProperty PSPath) -replace 'Microsoft.PowerShell.Core\\\\Registry::',''
"') do set GPU_KEY=%%P

if "%GPU_KEY%"=="" ( echo GPU key not found. & pause & exit /b 1 )
reg delete "%GPU_KEY%" /v "PowerMizerEnable" /f 2>nul
reg delete "%GPU_KEY%" /v "PowerMizerLevel" /f 2>nul
reg delete "%GPU_KEY%" /v "PowerMizerLevelAC" /f 2>nul
reg delete "%GPU_KEY%" /v "PerfLevelSrc" /f 2>nul
reg delete "%GPU_KEY%" /v "DisableDynamicPstate" /f 2>nul
reg delete "HKLM\\SOFTWARE\\NVIDIA Corporation\\Global\\NVTweak" /v "GLShaderDiskCache" /f 2>nul
reg delete "HKLM\\SOFTWARE\\NVIDIA Corporation\\Global\\NVTweak" /v "GLShaderDiskCacheMaxSize" /f 2>nul
echo NVIDIA Max FPS profile reverted. Reboot recommended.
pause`},
    {id:'nvcp-performance-profile',icon:'🟢',name:'NVIDIA Control Panel — Balanced Performance Profile',badges:['perf','fps','gpu'],
     impact:`Sets NVIDIA Control Panel to prioritise performance over image quality and enables low-latency mode. Disables unnecessary post-processing, forces the GPU to use its render pipeline at maximum efficiency. In CS2 and Valorant, the low-latency submit mode reduces the GPU pre-rendered frame queue from 3 frames to 1, cutting the lag between mouse movement and the frame appearing on screen by up to 2–4ms.`,
     desc:'Balanced profile — high quality texture filtering with performance optimisations. Sets shader cache to unlimited, enables low-latency mode, and removes GPU throttle. Best for players who want visual quality maintained while still getting the latency improvements.',
     apply:`@echo off
REM OPTI — NVIDIA Balanced Performance Profile
REM Run as Administrator. Reboot recommended.

echo Locating NVIDIA GPU registry key...
for /f "delims=" %%P in ('powershell -NoProfile -Command "^
(Get-ChildItem 'HKLM:\\SYSTEM\\CurrentControlSet\\Control\\Video' -Recurse -EA SilentlyContinue ^| ^
 Where-Object { try{(Get-ItemProperty $_.PSPath -EA SilentlyContinue).'Device Description' -like '*NVIDIA*'}catch{$false} } ^| ^
 Where-Object { $_.PSChildName -eq '0000' } ^| Select-Object -First 1 -ExpandProperty PSPath) -replace 'Microsoft.PowerShell.Core\\\\Registry::',''
"') do set GPU_KEY=%%P

if "%GPU_KEY%"=="" ( echo ERROR: NVIDIA GPU key not found. & pause & exit /b 1 )
echo Found: %GPU_KEY%

echo [1/2] Removing forced max performance (letting driver manage clocks adaptively)...
reg delete "%GPU_KEY%" /v "PowerMizerEnable" /f 2>nul
reg delete "%GPU_KEY%" /v "PowerMizerLevel" /f 2>nul
reg delete "%GPU_KEY%" /v "PowerMizerLevelAC" /f 2>nul

echo [2/2] Setting unlimited shader cache...
reg add "HKLM\\SOFTWARE\\NVIDIA Corporation\\Global\\NVTweak" /v "GLShaderDiskCacheMaxSize" /t REG_DWORD /d 102400 /f
reg add "HKLM\\SOFTWARE\\NVIDIA Corporation\\Global\\NVTweak" /v "GLShaderDiskCache" /t REG_DWORD /d 1 /f

echo.
echo Also set in NVIDIA Control Panel ^> Manage 3D Settings:
echo   - Texture Filtering Quality  : High Quality
echo   - Anisotropic Filtering      : 16x
echo   - Low Latency Mode           : On
echo   - Power Management Mode      : Optimal Power
echo   - VSync                      : Adaptive
echo   - Threaded Optimization      : On
echo.
echo Reboot for full effect.
pause`,
     revert:`@echo off
reg delete "HKLM\\SOFTWARE\\NVIDIA Corporation\\Global\\NVTweak" /v "GLShaderDiskCache" /f 2>nul
reg delete "HKLM\\SOFTWARE\\NVIDIA Corporation\\Global\\NVTweak" /v "GLShaderDiskCacheMaxSize" /f 2>nul
echo NVIDIA Balanced profile reverted. Reboot recommended.
pause`},
    {id:'nvcp-g-sync',icon:'🖥️',name:'NVIDIA G-Sync / DLSS / Reflex Setup',badges:['latency','gpu'],
     desc:'Configure G-Sync, DLSS, and NVIDIA Reflex for the best combination of frame smoothness and low latency. G-Sync + FPS cap = no tearing, no VSync lag, and no GPU queue buildup. NVIDIA Reflex cuts system latency by up to 50ms in supported games.',
     impact:`G-Sync synchronises the monitor's refresh rate to your GPU's render rate, eliminating screen tearing without the frame time stall of V-Sync. NVIDIA Reflex reduces the CPU-side latency by aligning game simulation ticks with GPU renders. Together with in-game Reflex enabled, this combination delivers the lowest achievable end-to-end latency in CS2 and Valorant while maintaining a tear-free image.`,
     apply:`REM NVIDIA Control Panel — Manual steps (registry values vary by GPU generation):\n\nREM --- G-SYNC SETUP ---\nREM NVCP > Display > Set up G-SYNC\nREM Enable G-SYNC for windowed and fullscreen mode\nREM Enable settings for selected display model\n\nREM --- OPTIMAL FPS CAP FOR G-SYNC ---\nREM Set Max Frame Rate in NVCP to: [monitor max Hz - 3]\nREM Example: 144Hz monitor → cap at 141 FPS\nREM This keeps GPU busy but prevents hitting VSync wall\n\nREM --- NVIDIA REFLEX (in-game setting) ---\nREM Look for "NVIDIA Reflex Low Latency" in game settings\nREM Set to "Enabled + Boost" for lowest latency\nREM Supported: Valorant, CS2, Apex, Warzone, Overwatch 2\n\nREM --- DLSS (in-game setting) ---\nREM Use DLSS Quality or Balanced for near-native image quality\nREM DLSS Performance = more FPS but softer image\nREM DLSS Ultra Performance = for 4K → 1080p internal render\n\nREM Registry — Enable G-Sync globally:\nReg add "HKLM\\SYSTEM\\CurrentControlSet\\Services\\nvlddmkm\\Global\\NVTweak" /v "RmProfilingAdminOnly" /t REG_DWORD /d 0 /f`,
     revert:`REM Disable G-Sync in NVCP > Display > Set up G-SYNC\nReg delete "HKLM\\SYSTEM\\CurrentControlSet\\Services\\nvlddmkm\\Global\\NVTweak" /v "RmProfilingAdminOnly" /f`},
    {id:'nvcp-digital-vibrance',icon:'🎨',name:'NVIDIA Digital Vibrance — Competitive Visibility',badges:['gpu'],
     desc:'Digital Vibrance increases color saturation at the driver level without affecting performance. Competitive players use 60-80% to make enemy models and muzzle flashes more visually distinct against backgrounds. Applied via registry — works globally across all games.',
     impact:`Increases colour saturation at the GPU driver level with zero performance cost. Competitive CS2 and Valorant players use 70–85% digital vibrance to make enemy models more visually distinct against backgrounds — especially useful on Mirage/Dust2 in CS2 where yellow wall textures can blend with the default player model colours. Purely a visibility advantage, no FPS impact.`,
     apply:`REM Digital Vibrance registry (display-specific — GUID varies)\nREM Universal method using NVCP:\nREM NVCP > Display > Adjust desktop color settings\nREM Digital Vibrance: 60-80% (70% is the common competitive sweet spot)\nREM\nREM Note: registry path is display-specific and requires your monitor GUID\nREM The NVCP slider is the reliable method\nREM\nREM For full automation, use the free tool "VibranceGUI":\nREM github.com/juv/vibrance-gui\nREM Set profile per game (100% default, 70% in-game)`,
     revert:`REM NVCP > Display > Adjust desktop color settings\nREM Digital Vibrance: 50% (neutral/default)`},
